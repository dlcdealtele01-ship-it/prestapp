<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestapp - Gestión de Préstamos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
        .hidden { display: none !important; }
        dialog::backdrop { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); }
        .card-shadow { box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.04); }
        label { display: block; text-align: left; font-weight: 800; text-transform: uppercase; font-size: 10px; color: #94a3b8; margin-bottom: 4px; margin-left: 8px; }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-900">

    <script>
        // Configuración de Supabase
        const supabaseUrl = 'https://jppaqmfagtbvkxjkrdfd.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwcGFxbWZhZ3Ridmt4amtyZGZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTYyMTEsImV4cCI6MjA5MDI5MjIxMX0.ME7iJkLB7v1Jg3KhL2a-FoU1bCNhA1GR8vQDBt3tNdI';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    </script>

    <div id="authScreen" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-[2.5rem] border card-shadow w-full max-w-sm text-center">
            <div class="mb-8">
                <span class="text-2xl font-extrabold text-slate-950 uppercase">Prest<span class="text-emerald-500">app</span></span>
            </div>
            <div class="space-y-4">
                <input type="email" id="authEmail" placeholder="Correo" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none">
                <input type="password" id="authPassword" placeholder="Contraseña" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="handleAuth('login')" class="p-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs">Entrar</button>
                    <button onclick="handleAuth('signup')" class="p-4 bg-white border border-slate-200 rounded-2xl font-black uppercase text-xs">Unirse</button>
                </div>
                <button onclick="handleResetPassword()" class="text-[10px] font-black text-slate-400 uppercase hover:text-blue-500">¿Olvidaste tu contraseña?</button>
            </div>
            <p id="authError" class="text-red-500 text-[10px] font-bold mt-4 uppercase"></p>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="bg-white border-b p-4 sticky top-0 z-50 flex justify-between items-center">
            <span class="text-xl font-extrabold uppercase">Prest<span class="text-emerald-500">app</span></span>
            <div class="flex items-center gap-3">
                <select id="selectCartera" onchange="cambiarCartera(this.value)" class="bg-slate-100 text-[10px] font-black uppercase px-4 py-2 rounded-full outline-none"></select>
                <button onclick="handleLogout()" class="p-2 text-red-400"><i class="ph-bold ph-power text-xl"></i></button>
            </div>
        </nav>

        <main id="viewDashboard" class="max-w-5xl mx-auto p-4 md:p-8">
            <div class="grid grid-cols-2 gap-4 mb-8 text-center">
                <div class="bg-white p-6 rounded-[2rem] border card-shadow">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Capital</p>
                    <h2 id="totalCapital" class="text-2xl font-black">$0.00</h2>
                </div>
                <div class="bg-white p-6 rounded-[2rem] border card-shadow">
                    <p class="text-[9px] font-black text-slate-400 uppercase">Interés</p>
                    <h2 id="totalIntereses" class="text-2xl font-black text-emerald-600">$0.00</h2>
                </div>
            </div>
            <div class="bg-white rounded-[2rem] border overflow-hidden card-shadow">
                <table class="w-full text-left">
                    <tbody id="listaPrestamos" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
            <button onclick="abrirModalNuevo()" class="fixed bottom-8 right-8 bg-slate-900 text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition"><i class="ph-bold ph-plus text-2xl"></i></button>
        </main>

        <main id="viewHistorial" class="hidden max-w-2xl mx-auto p-6">
            <button onclick="cerrarHistorial()" class="mb-6 font-black text-[10px] text-slate-400 uppercase flex items-center gap-2"><i class="ph-bold ph-caret-left"></i> Volver</button>
            <div class="bg-white p-8 rounded-[2.5rem] border mb-6 text-center card-shadow relative">
                <button onclick="abrirModalEditar()" class="absolute top-6 right-6 text-slate-300"><i class="ph-bold ph-pencil-simple text-xl"></i></button>
                <h2 id="histNombre" class="text-3xl font-black uppercase italic tracking-tighter"></h2>
                <p id="histSaldo" class="text-emerald-600 font-black text-xl mt-1"></p>
                <button onclick="eliminarPrestamoCompleto()" class="mt-4 text-[10px] font-black text-red-200 uppercase">Eliminar Préstamo</button>
            </div>
            <div id="listaPagosHistorial" class="space-y-3"></div>
        </main>
    </div>

    <dialog id="modalPago" class="rounded-[2rem] p-8 w-full max-w-xs border-none text-center relative">
        <button onclick="this.closest('dialog').close()" class="absolute top-6 right-6 text-slate-300"><i class="ph-bold ph-x text-xl"></i></button>
        <h3 id="pagoTitle" class="font-black uppercase mb-4 italic text-slate-400 text-[10px]">Registrar Abono</h3>
        <div class="space-y-4 mb-6">
            <div>
                <label>Fecha del Pago</label>
                <input type="date" id="fechaPago" class="w-full p-3 bg-slate-50 border rounded-xl font-bold text-sm outline-none text-center">
            </div>
            <div class="flex items-center justify-center gap-2">
                <input type="checkbox" id="checkTodoCapital" class="accent-slate-900"> 
                <span class="text-[10px] font-black uppercase text-slate-400">100% Capital</span>
            </div>
            <input type="number" id="montoPago" placeholder="0.00" class="w-full p-5 bg-slate-100 rounded-2xl font-black text-3xl text-center outline-none">
        </div>
        <button onclick="confirmarPago()" class="w-full p-5 bg-slate-900 text-white rounded-2xl font-black uppercase shadow-lg">Confirmar</button>
    </dialog>

    <dialog id="modalForm" class="rounded-[2rem] p-8 w-full max-w-sm border-none relative">
        <button onclick="this.closest('dialog').close()" class="absolute top-6 right-6 text-slate-300"><i class="ph-bold ph-x text-xl"></i></button>
        <h3 id="formTitle" class="font-black mb-6 uppercase text-center">Datos Préstamo</h3>
        <div class="space-y-4">
            <div><label>Cliente</label><input type="text" id="formNombre" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none"></div>
            <div><label>Monto</label><input type="number" id="formMonto" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none"></div>
            <div class="grid grid-cols-2 gap-2">
                <div><label>Interés %</label><select id="formTasa" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none"><option value="20">20%</option><option value="15">15%</option><option value="10">10%</option></select></div>
                <div><label>Gracia (Días)</label><input type="number" id="formGracia" value="0" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none"></div>
            </div>
            <button onclick="guardarPrestamo()" class="w-full p-5 bg-emerald-600 text-white rounded-2xl font-black uppercase">Guardar</button>
        </div>
    </dialog>

    <script>
        let currentUser = null, idCarteraActual = null, pActivo = null, modoEdicionForm = false, idPagoAEditar = null;

        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                await cargarCarteras();
            } else {
                document.getElementById('authScreen').classList.remove('hidden');
            }
        }

        async function handleAuth(type) {
            const email = authEmail.value, password = authPassword.value;
            const { error } = type === 'login' 
                ? await _supabase.auth.signInWithPassword({ email, password })
                : await _supabase.auth.signUp({ email, password });
            if (error) authError.innerText = error.message; else init();
        }

        async function handleResetPassword() {
            const email = authEmail.value;
            if (!email) return alert("Escribe tu correo");
            const { error } = await _supabase.auth.resetPasswordForEmail(email, { redirectTo: 'https://prestapp.space' });
            alert(error ? error.message : "Correo enviado");
        }

        async function cargarCarteras() {
            const { data } = await _supabase.from('carteras').select('*');
            if (data?.length) {
                idCarteraActual = data[0].id;
                selectCartera.innerHTML = data.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
                cargarDatos();
            }
        }

        async function cargarDatos() {
            const { data: prestamos } = await _supabase.from('prestamos').select('*, clientes(*), pagos(*)').eq('cartera_id', idCarteraActual);
            listaPrestamos.innerHTML = '';
            prestamos?.forEach(p => {
                const calc = calcularSaldo(p);
                listaPrestamos.innerHTML += `<tr class="cursor-pointer hover:bg-slate-50" onclick="verHistorial('${p.id}')">
                    <td class="p-6 font-black uppercase text-xs">${p.clientes.nombre}</td>
                    <td class="p-6 text-right font-black">$${calc.capital.toFixed(2)}</td>
                    <td class="p-6 w-10" onclick="event.stopPropagation()"><button onclick="abrirModalPago('${p.id}')" class="bg-emerald-500 text-white p-2 rounded-lg"><i class="ph-bold ph-hand-coins"></i></button></td>
                </tr>`;
            });
        }

        function abrirModalPago(id) {
            pActivo = {id}; idPagoAEditar = null;
            fechaPago.value = new Date().toISOString().split('T')[0];
            modalPago.showModal();
        }

        function abrirEditarPago(id, monto, esCapital, fecha) {
            idPagoAEditar = id;
            montoPago.value = monto;
            fechaPago.value = new Date(fecha).toISOString().split('T')[0];
            document.getElementById('checkTodoCapital').checked = !esCapital;
            modalPago.showModal();
        }

        async function confirmarPago() {
            const m = parseFloat(montoPago.value), f = fechaPago.value;
            const checkCap = document.getElementById('checkTodoCapital').checked;
            const datos = { monto_pagado: m, fecha_pago: f, aplicar_interes: !checkCap };

            if(idPagoAEditar) await _supabase.from('pagos').update(datos).eq('id', idPagoAEditar);
            else await _supabase.from('pagos').insert([{ ...datos, prestamo_id: pActivo.id, user_id: currentUser.id }]);
            
            modalPago.close();
            if(pActivo.id) verHistorial(pActivo.id); else cargarDatos();
        }

        async function verHistorial(id) {
            const { data: p } = await _supabase.from('prestamos').select('*, clientes(*), pagos(*)').eq('id', id).single();
            pActivo = p;
            viewDashboard.classList.add('hidden'); viewHistorial.classList.remove('hidden');
            histNombre.innerText = p.clientes.nombre;
            listaPagosHistorial.innerHTML = p.pagos.map(pg => `
                <div class="bg-white p-4 rounded-2xl border flex justify-between items-center">
                    <div><p class="text-[10px] text-slate-400 font-bold">${pg.fecha_pago}</p><p class="font-black">$${pg.monto_pagado}</p></div>
                    <button onclick="abrirEditarPago('${pg.id}', ${pg.monto_pagado}, ${pg.aplicar_interes}, '${pg.fecha_pago}')" class="text-slate-300"><i class="ph-bold ph-pencil-simple text-xl"></i></button>
                </div>`).join('');
        }

        function calcularSaldo(p) {
            let cap = parseFloat(p.monto_prestado), tasa = p.tasa_interes / 100;
            p.pagos?.forEach(pg => {
                if (pg.aplicar_interes) cap -= (pg.monto_pagado - (cap * tasa));
                else cap -= pg.monto_pagado;
            });
            return { capital: Math.max(0, cap), interes: cap * tasa };
        }

        function cerrarHistorial() { viewHistorial.classList.add('hidden'); viewDashboard.classList.remove('hidden'); cargarDatos(); }
        function handleLogout() { _supabase.auth.signOut().then(() => location.reload()); }
        window.onload = init;
    </script>
</body>
</html>
