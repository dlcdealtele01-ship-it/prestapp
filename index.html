<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PrestApp Cloud v22</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <!-- Librería de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .modal-overlay { background: rgba(0,0,0,0.9); display: none; position: fixed; inset: 0; z-index: 100; justify-content: center; align-items: center; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="app-root">
        <div class="flex items-center justify-center min-h-screen">
            <p class="animate-pulse font-bold text-slate-400">Cargando sistema...</p>
        </div>
    </div>

    <!-- MODAL RECIBO -->
    <div id="modal-recibo" class="modal-overlay p-4">
        <div class="flex flex-col items-center w-full max-w-xs">
            <div id="recibo-visual" class="p-8 bg-white text-black shadow-2xl mb-6 border-t-8 border-slate-900 w-full text-center italic font-mono">
                <h2 class="font-bold border-b pb-2 text-sm uppercase">Recibo de Pago</h2>
                <div class="text-left text-[11px] my-4 space-y-1 font-bold uppercase">
                    <p>FECHA: <span id="r-fecha"></span></p>
                    <p>CLIENTE: <span id="r-cliente"></span></p>
                </div>
                <h1 class="text-4xl font-black my-2">$<span id="r-monto"></span></h1>
                <p>-------------------------</p>
                <p class="text-xl font-bold">$<span id="r-saldo"></span></p>
                <p class="mt-8 text-[8px] opacity-40 uppercase">Gierel Axel.Dev Software</p>
            </div>
            <div class="flex gap-2 w-full">
                <button onclick="cerrarModal()" class="flex-1 bg-slate-700 text-white py-4 rounded-xl text-[10px] font-bold">CERRAR</button>
                <button onclick="compartirImagen()" class="flex-[2] bg-green-600 text-white py-4 rounded-xl text-[10px] font-bold shadow-lg uppercase">WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const SB_URL = "https://jppaqmfagtbvkxjkrdfd.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwcGFxbWZhZ3Ridmt4amtyZGZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTYyMTEsImV4cCI6MjA5MDI5MjIxMX0.ME7iJkLB7v1Jg3KhL2a-FoU1bCNhA1GR8vQDBt3tNdI";

        let supabase, db = [], vista = 'dashboard', idActivo = null, user = null;

        // --- INICIO SEGURO ---
        window.onload = async function() {
            try {
                if (!window.supabase) throw new Error("No se pudo cargar la librería de Supabase. Revisa tu internet.");
                supabase = window.supabase.createClient(SB_URL, SB_KEY);
                await checkSession();
            } catch (err) {
                document.getElementById('app-root').innerHTML = `
                    <div class="p-10 text-center">
                        <h1 class="text-red-500 font-bold">Error Crítico</h1>
                        <p class="text-xs text-gray-500 mt-2">${err.message}</p>
                        <button onclick="location.reload()" class="mt-4 bg-slate-900 text-white px-4 py-2 rounded-lg text-xs">Reintentar</button>
                    </div>`;
            }
        };

        async function checkSession() {
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                user = data.session.user;
                await fetchCloud();
            } else {
                render();
            }
        }

        async function login(e) {
            e.preventDefault();
            const email = document.getElementById('log-user').value;
            const pass = document.getElementById('log-pass').value;
            const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
            if (error) alert("Error: " + error.message);
            else { user = data.user; await fetchCloud(); }
        }

        async function fetchCloud() {
            const { data, error } = await supabase.from('prestapp_data').select('datos').eq('user_id', user.id).single();
            if (data) db = data.datos;
            else await supabase.from('prestapp_data').insert({ user_id: user.id, datos: [] });
            render();
        }

        async function sync() {
            await supabase.from('prestapp_data').update({ datos: db }).eq('user_id', user.id);
            render();
        }

        function navegar(v, id = null) { vista = v; idActivo = id; render(); }

        function saveForm(e) {
            e.preventDefault();
            const n = document.getElementById('f-nom').value, 
                  s = parseFloat(document.getElementById('f-sal').value), 
                  t = parseFloat(document.getElementById('f-tas').value);
            if (idActivo) { 
                let p = db.find(x => x.id === idActivo); 
                p.nombre = n; p.saldo = s; p.tasa = t; 
            } else { 
                db.push({ id: Date.now(), nombre: n, saldo: s, tasa: t, estado: 'activo', historial: [] }); 
            }
            sync(); navegar('dashboard');
        }

        function registrarPago() {
            const m = parseFloat(document.getElementById('m-pago').value);
            if (!m || m <= 0) return;
            let p = db.find(x => x.id === idActivo);
            p.saldo = (p.saldo + (p.saldo * p.tasa)) - m;
            if (p.saldo <= 0.05) { p.saldo = 0; p.estado = 'pagado'; }
            p.historial.unshift({ f: new Date().toLocaleDateString(), m: m, s: p.saldo });
            sync();
        }

        // --- RENDERIZADO ---
        function render() {
            const root = document.getElementById('app-root');
            if (!user) {
                root.innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-900 animate-fade">
                    <div class="w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-2xl">
                        <h1 class="text-4xl font-black text-slate-900 text-center mb-0 tracking-tighter uppercase italic">PREST<span class="text-indigo-600">APP</span></h1>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-10 text-center">Por Gierel Axel.Dev</p>
                        <form onsubmit="login(event)" class="space-y-4">
                            <input id="log-user" type="email" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold" placeholder="Email" required>
                            <input id="log-pass" type="password" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none font-bold" placeholder="Contraseña" required>
                            <button type="submit" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl uppercase tracking-widest text-[10px] shadow-xl">Ingresar</button>
                        </form>
                    </div>
                </div>`;
                return;
            }

            const activos = db.filter(p => p.estado !== 'pagado');
            const totalC = activos.reduce((acc, p) => acc + p.saldo, 0);
            const totalG = activos.reduce((acc, p) => acc + (p.saldo * p.tasa), 0);

            let h = `
            <header class="bg-slate-900 text-white p-6 sticky top-0 z-40 flex justify-between items-center italic shadow-lg">
                <div><h1 class="text-xl font-black">PRESTAPP</h1><p class="text-[8px] text-indigo-400 font-bold uppercase tracking-widest mt-1">Gierel Axel.Dev</p></div>
                <button onclick="supabase.auth.signOut().then(()=>location.reload())" class="text-[9px] font-bold text-red-400 uppercase border border-red-900 px-3 py-1 rounded-lg">Salir</button>
            </header>
            <div class="max-w-md mx-auto p-4 pb-32">`;

            if (vista === 'dashboard') {
                h += `
                <div class="bg-slate-800 p-6 rounded-[2rem] text-white shadow-xl mb-6 border-b-4 border-indigo-500 flex justify-between">
                    <div><p class="text-[9px] font-bold text-indigo-300 uppercase italic">Capital</p><p class="text-2xl font-black tracking-tighter font-mono">$${totalC.toFixed(2)}</p></div>
                    <div class="text-right"><p class="text-[9px] font-bold text-green-400 uppercase italic">Interés Q.</p><p class="text-2xl font-black text-green-400 tracking-tighter font-mono">+$${totalG.toFixed(2)}</p></div>
                </div>
                <button onclick="navegar('formulario')" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl mb-6 shadow-xl text-xs uppercase italic tracking-widest">+ Nuevo Cliente</button>`;
                
                activos.forEach(p => {
                    h += `
                    <div onclick="navegar('detalle', ${p.id})" class="bg-white p-5 rounded-2xl border mb-3 flex justify-between items-center border-l-4 border-indigo-500 shadow-sm active:bg-slate-50">
                        <div><p class="font-bold text-slate-800 uppercase tracking-tighter">${p.nombre}</p><p class="text-[10px] text-red-500 font-bold uppercase mt-1 italic leading-none">Int: $${(p.saldo*p.tasa).toFixed(2)}</p></div>
                        <p class="text-xl font-black tracking-tighter font-mono">$${p.saldo.toFixed(2)}</p>
                    </div>`;
                });
            } else if (vista === 'formulario') {
                const e = idActivo ? db.find(x => x.id === idActivo) : null;
                h += `
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl">
                    <h2 class="text-xl font-black mb-8 text-center uppercase tracking-tighter italic underline decoration-indigo-500 underline-offset-8">${idActivo?'Editar':'Nuevo'} Registro</h2>
                    <form onsubmit="saveForm(event)" class="space-y-4">
                        <input id="f-nom" value="${e?e.nombre:''}" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold text-sm" placeholder="Nombre completo" required>
                        <input id="f-sal" type="number" step="0.01" value="${e?e.saldo:''}" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold text-sm" placeholder="Saldo inicial $" required>
                        <select id="f-tas" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold text-sm">
                            <option value="0.10" ${e&&e.tasa==0.1?'selected':''}>10% Quincenal</option>
                            <option value="0.15" ${e&&e.tasa==0.15?'selected':''}>15% Quincenal</option>
                        </select>
                        <div class="flex gap-4 pt-4">
                            <button type="button" onclick="navegar('dashboard')" class="flex-1 text-gray-400 font-bold uppercase text-[10px] italic">Cancelar</button>
                            <button type="submit" class="flex-[2] bg-indigo-600 text-white py-4 rounded-xl font-black uppercase text-[10px] shadow-lg">Guardar</button>
                        </div>
                    </form>
                </div>`;
            } else if (vista === 'detalle') {
                const p = db.find(x => x.id === idActivo);
                const intH = p.saldo * p.tasa;
                h += `
                    <div class="flex justify-between items-center mb-6"><button onclick="navegar('dashboard')" class="text-slate-900 font-bold text-xs uppercase tracking-widest">← Inicio</button>
                    <div class="flex gap-2">
                        <button onclick="navegar('formulario', ${p.id})" class="bg-slate-200 px-4 py-2 rounded-xl text-[10px] font-bold">EDITAR</button>
                        <button onclick="if(confirm('¿Borrar?')){db=db.filter(x=>x.id!==${p.id});sync();navegar('dashboard');}" class="bg-red-50 text-red-500 px-4 py-2 rounded-xl text-[10px] font-bold uppercase italic">Borrar</button>
                    </div></div>
                    <div class="bg-slate-900 p-10 rounded-[3rem] text-white shadow-2xl mb-8 text-center italic relative overflow-hidden">
                        <p class="text-indigo-400 text-[9px] font-bold uppercase mb-1 tracking-[0.3em]">${p.nombre}</p>
                        <h2 class="text-5xl font-black tracking-tighter">$${p.saldo.toFixed(2)}</h2>
                        <p class="text-[9px] text-red-400 font-bold uppercase mt-4">Interés a cobrar: $${intH.toFixed(2)}</p>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] border shadow-sm mb-8 flex gap-2 items-center">
                        <input id="m-pago" type="number" placeholder="Monto $" class="flex-1 p-4 bg-slate-50 border rounded-xl font-bold text-sm outline-none focus:border-indigo-500">
                        <button onclick="registrarPago()" class="bg-green-600 text-white px-8 h-14 rounded-xl font-black uppercase text-xs shadow-md active:bg-green-700">Pagar</button>
                    </div>
                    <div class="space-y-3 font-bold italic uppercase pb-20">
                        ${p.historial.map(reg => `
                            <div class="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-50 shadow-sm">
                                <div><p class="text-[8px] text-gray-400 leading-none mb-1 tracking-widest uppercase">${reg.f}</p><p class="text-sm font-black text-slate-800 tracking-tighter uppercase leading-none italic">Recibido: $${reg.m.toFixed(2)}</p></div>
                                <button onclick="abrirRecibo('${p.nombre}', ${reg.m}, ${reg.s}, '${reg.f}')" class="bg-green-50 p-3 rounded-xl active:scale-90 transition-transform">
                                    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="w-5 h-5 opacity-70">
                                </button>
                            </div>`).join('')}
                    </div>`;
            }
            root.innerHTML = h + "</div>";
        }

        // --- FUNCIONES RECIBO ---
        function abrirRecibo(n, m, s, f) {
            document.getElementById('r-fecha').innerText = f;
            document.getElementById('r-cliente').innerText = n;
            document.getElementById('r-monto').innerText = m.toFixed(2);
            document.getElementById('r-saldo').innerText = s.toFixed(2);
            document.getElementById('modal-recibo').style.display = 'flex';
        }
        function cerrarModal() { document.getElementById('modal-recibo').style.display = 'none'; }
        async function compartirImagen() {
            const ticket = document.getElementById('recibo-visual');
            const canvas = await html2canvas(ticket);
            canvas.toBlob(async (blob) => {
                const file = new File([blob], 'recibo.png', { type: 'image/png' });
                if (navigator.share) await navigator.share({ files: [file], title: 'Recibo' });
            });
        }
    </script>
</body>
</html>
