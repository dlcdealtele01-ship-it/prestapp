<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PrestApp v.66</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Playfair+Display:ital,wght@1,600&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .modal-overlay { background: rgba(0,0,0,0.9); display: none; position: fixed; inset: 0; z-index: 100; justify-content: center; align-items: center; }
        .animate-fade { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .ws-icon { width: 20px; height: 20px; }
        .logo-text { letter-spacing: -0.05em; }
        .verde-dolar { color: #22c55e; }
        /* Nueva fuente profesional para tu firma */
        .signature-font { font-family: 'Playfair Display', serif; letter-spacing: 0.1em; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900">

    <div id="app-root"></div>

    <div id="modal-recibo" class="modal-overlay p-4">
        <div class="flex flex-col items-center w-full max-w-xs">
            <div id="area-captura" class="p-8 bg-white text-black shadow-2xl mb-6 border-t-8 border-slate-900 w-full text-center italic" style="font-family: monospace;">
                <div id="contenido-recibo"></div>
            </div>
            <div class="flex gap-2 w-full">
                <button onclick="cerrarModal()" class="flex-1 bg-slate-700 text-white py-4 rounded-2xl text-[10px] font-black uppercase">Cerrar</button>
                <button onclick="compartirImagen()" class="flex-[2] bg-green-600 text-white py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest">WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://jppaqmfagtbvkxjkrdfd.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwcGFxbWZhZ3Ridmt4amtyZGZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTYyMTEsImV4cCI6MjA5MDI5MjIxMX0.ME7iJkLB7v1Jg3KhL2a-FoU1bCNhA1GR8vQDBt3tNdI";
        const SECRET_TAG = "mis_datos_privados_777";

        let db = [], vista = 'login', subVista = 'activos', idActivo = null, editandoPagoIdx = null;
        let calcData = { saldo: 0, tasa: 0.05, fechaUlt: '', abono: 0 };

        async function fetchCloud() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/prestapp_data?clave_secreta=eq.${SECRET_TAG}&select=datos`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                const json = await res.json();
                if (json && json.length > 0) { db = json[0].datos || []; }
                render();
            } catch (e) { console.error("Error cargando datos:", e); render(); }
        }

        async function syncCloud() {
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/prestapp_data?clave_secreta=eq.${SECRET_TAG}`, {
                    method: 'PATCH',
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ datos: db })
                });
            } catch (e) { console.error("Error guardando datos:", e); }
        }

        function intentarLogin() {
            const user = document.getElementById('user-input').value;
            const pass = document.getElementById('pass-input').value;
            if (user === "ruthnoemic" && pass === "Hibrju05.") {
                vista = 'dashboard';
                fetchCloud();
            } else { alert("Credenciales incorrectas"); }
        }

        function navegar(v, id = null) { 
            vista = v; idActivo = id; editandoPagoIdx = null;
            render(); 
        }

        function eliminarPago(idx) {
            if(!confirm('¿Eliminar este abono?')) return;
            const p = db.find(x => x.id === idActivo);
            p.saldo += p.historial[idx].cobroCapital;
            p.historial.splice(idx, 1);
            if(p.saldo > 0.05) p.estado = 'activo';
            syncCloud().then(() => render());
        }

        function prepararEdicion(idx) {
            const p = db.find(x => x.id === idActivo);
            const pago = p.historial[idx];
            editandoPagoIdx = idx;
            render();
            setTimeout(() => {
                document.getElementById('monto-pago').value = pago.monto;
                document.getElementById('monto-pago').focus();
            }, 50);
        }

        function eliminarRegistroCompleto(id) {
            if(!confirm('¿ELIMINAR CLIENTE? Se perderá todo su historial.')) return;
            db = db.filter(x => x.id !== id);
            syncCloud().then(() => navegar('dashboard'));
        }

        function updateCalc() {
            if(!calcData.fechaUlt || !calcData.saldo) return;
            const hoy = new Date();
            const fechaRef = new Date(calcData.fechaUlt);
            const dias = Math.floor((hoy - fechaRef) / (1000 * 60 * 60 * 24));
            const quincenas = Math.floor(dias / 15);
            const interesAcumulado = (parseFloat(calcData.saldo) * calcData.tasa) * quincenas;
            const totalDeuda = parseFloat(calcData.saldo) + interesAcumulado;

            document.getElementById('c-res').innerHTML = `
                <p class="text-[10px] text-indigo-400 font-black uppercase mb-1">${dias} DÍAS (${quincenas} QUINCENAS)</p>
                <div class="flex justify-between border-b border-white/10 pb-1"><span>SALDO BASE:</span><span>$${parseFloat(calcData.saldo).toFixed(2)}</span></div>
                <div class="flex justify-between border-b border-white/10 py-1"><span>INT. ACUMULADO (${calcData.tasa*100}%):</span><span>$${interesAcumulado.toFixed(2)}</span></div>
                <div class="flex justify-between font-black text-lg py-1 text-green-400"><span>TOTAL REAL:</span><span>$${totalDeuda.toFixed(2)}</span></div>
            `;
        }

        function calcularDias(p) {
            const msDia = 1000 * 60 * 60 * 24;
            let ref = (p.historial && p.historial.length > 0) ? p.historial[0].fecha : null;
            let fechaRef = ref ? new Date(ref.split('/').reverse().join('-')) : new Date(p.id);
            return Math.floor((new Date() - fechaRef) / msDia);
        }

        function render() {
            const root = document.getElementById('app-root');
            let h = "";

            if (vista === 'login') {
                h = `<div class="h-screen flex flex-col items-center justify-center p-6 bg-slate-50 animate-fade text-center">
                    <h1 class="text-5xl font-black italic uppercase logo-text text-slate-900">PREST<span class="verde-dolar">APP</span><span class="verde-dolar text-6xl">⚡</span></h1>
                    <p class="text-[11px] signature-font text-slate-400 italic mb-8 mt-1">by GierelAxel.dev</p>
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-xs border border-slate-100">
                        <input id="user-input" type="text" placeholder="USUARIO" class="w-full p-4 bg-slate-50 rounded-2xl mb-2 text-center font-black text-xs outline-none uppercase">
                        <input id="pass-input" type="password" placeholder="CONTRASEÑA" class="w-full p-4 bg-slate-50 rounded-2xl mb-6 text-center font-black outline-none">
                        <button onclick="intentarLogin()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest active:scale-95 transition-transform shadow-lg">Entrar</button>
                    </div>
                </div>`;
            } else if (vista === 'dashboard') {
                const activos = db.filter(p => p.estado !== 'pagado');
                const capCalle = activos.reduce((a, b) => a + b.saldo, 0);
                const ganPrev = activos.reduce((a, b) => a + (b.saldo * b.tasa), 0);

                h = `<header class="bg-slate-900 text-white p-6 sticky top-0 z-40 flex justify-between items-center shadow-lg">
                    <div><h1 class="font-black italic text-xl uppercase logo-text">PREST<span class="text-green-500">APP</span><span class="verde-dolar text-2xl">⚡</span></h1></div>
                    <button onclick="navegar('login')" class="text-[8px] font-black bg-red-500/20 text-red-400 px-3 py-2 rounded-xl border border-red-500/20">SALIR</button>
                </header>
                <div class="max-w-md mx-auto p-4 pb-32 animate-fade">
                    <div class="bg-slate-900 p-8 rounded-[2.8rem] text-white shadow-xl mb-4 text-center border-b-4 border-green-500">
                        <p class="text-[10px] font-black uppercase text-indigo-400 mb-1 tracking-widest">Capital en Calle</p>
                        <p class="text-4xl font-black italic tracking-tighter">$${capCalle.toLocaleString('es-ES', {minimumFractionDigits:2})}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-2 mb-6">
                        <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 text-center">
                            <p class="text-[8px] font-black text-slate-400 uppercase">Ganancia <span class="verde-dolar">⚡</span></p>
                            <p class="text-xl font-black text-green-600 italic">$${ganPrev.toFixed(2)}</p>
                        </div>
                        <div class="bg-white p-5 rounded-[2rem] shadow-sm border border-slate-100 text-center">
                            <p class="text-[8px] font-black text-slate-400 uppercase">Total Final</p>
                            <p class="text-xl font-black text-slate-800 italic">$${(capCalle + ganPrev).toFixed(2)}</p>
                        </div>
                    </div>
                    <div class="flex gap-1 mb-6 bg-slate-200/50 p-1 rounded-2xl font-black text-[8px] uppercase">
                        <button onclick="subVista='activos';render()" class="flex-1 py-3 rounded-xl ${subVista==='activos'?'bg-white text-indigo-600 shadow-sm':'text-slate-500'}">Activos</button>
                        <button onclick="subVista='morosos';render()" class="flex-1 py-3 rounded-xl ${subVista==='morosos'?'bg-white text-red-600 shadow-sm':'text-slate-500'}">Morosos</button>
                        <button onclick="subVista='pagados';render()" class="flex-1 py-3 rounded-xl ${subVista==='pagados'?'bg-white text-green-600 shadow-sm':'text-slate-500'}">Listos</button>
                        <button onclick="subVista='calc';render()" class="flex-1 py-3 rounded-xl ${subVista==='calc'?'bg-white text-orange-500 shadow-sm':'text-slate-500'}">CALC</button>
                    </div>`;

                if(subVista === 'calc') {
                    h += `<div class="bg-white p-6 rounded-[2.5rem] shadow-xl space-y-4 border border-slate-100">
                        <input type="number" placeholder="Saldo Actual $" oninput="calcData.saldo=this.value;updateCalc()" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none text-center">
                        <div class="grid grid-cols-2 gap-2"><select onchange="calcData.tasa=parseFloat(this.value);updateCalc()" class="p-4 bg-slate-50 rounded-2xl font-black outline-none"><option value="0.05">5%</option><option value="0.10">10%</option><option value="0.15">15%</option></select><input type="date" onchange="calcData.fechaUlt=this.value;updateCalc()" class="p-4 bg-slate-50 rounded-2xl font-bold text-[10px]"></div>
                        <div id="c-res" class="bg-slate-900 p-6 rounded-3xl text-white text-[11px] font-bold space-y-1"></div>
                        <button onclick="prepararCapturaCalc()" class="w-full bg-slate-800 text-white py-4 rounded-2xl font-black uppercase text-[10px]">📷 Proyectar Recibo</button>
                    </div>`;
                } else {
                    let lista = subVista==='pagados' ? db.filter(p=>p.estado==='pagado') : (subVista==='morosos' ? activos.filter(p=>calcularDias(p)>=17) : activos.filter(p=>calcularDias(p)<17));
                    lista.forEach(p => {
                        const d = calcularDias(p);
                        h += `<div onclick="navegar('detalle', ${p.id})" class="bg-white p-5 rounded-[2.2rem] shadow-sm mb-3 flex justify-between items-center border-l-[8px] ${subVista==='morosos'?'border-l-red-500':(p.estado==='pagado'?'border-l-green-500':'border-l-indigo-600')} active:scale-95 transition-transform border border-slate-50">
                            <div><p class="font-black uppercase text-xs text-slate-800">${p.nombre}</p><p class="text-[9px] text-slate-400 font-bold italic uppercase">${d} días</p></div>
                            <p class="text-lg font-black italic tracking-tighter text-slate-900">$${p.saldo.toFixed(2)}</p>
                        </div>`;
                    });
                }
                h += `<button onclick="navegar('formulario')" class="fixed bottom-6 right-6 w-16 h-16 bg-slate-900 text-white rounded-full shadow-2xl text-4xl font-light flex items-center justify-center z-50 shadow-black/20">+</button>`;
            } else if (vista === 'detalle') {
                const p = db.find(x => x.id === idActivo);
                h = `<div class="max-w-md mx-auto p-4 pb-32 animate-fade">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="navegar('dashboard')" class="bg-white px-5 py-2 rounded-2xl font-black text-[10px] uppercase shadow-sm border border-slate-100">← Volver</button>
                        <button onclick="navegar('formulario', ${p.id})" class="bg-indigo-50 text-indigo-600 px-5 py-2 rounded-2xl font-black text-[10px] uppercase">Ficha / Editar</button>
                    </div>
                    <div class="bg-slate-900 p-10 rounded-[3rem] text-white text-center mb-6 border-t-8 border-green-500">
                        <p class="text-white/30 text-[10px] font-black uppercase mb-1">${p.nombre}</p>
                        <h2 class="text-5xl font-black italic">$${p.saldo.toFixed(2)}</h2>
                        <div class="mt-4 inline-block px-4 py-1 bg-green-500/20 text-green-400 rounded-full text-[9px] font-black uppercase italic">Interés: $${(p.saldo*p.tasa).toFixed(2)} (${p.tasa*100}%)</div>
                    </div>
                    <div class="bg-white p-6 rounded-[2.5rem] shadow-xl mb-8 space-y-4">
                        <div class="grid grid-cols-2 gap-2"><input id="fecha-pago" type="date" class="p-4 bg-slate-50 rounded-2xl font-bold text-xs"><input id="monto-pago" type="number" placeholder="Monto $" class="p-4 bg-slate-50 rounded-2xl font-black text-center outline-none"></div>
                        <button onclick="registrarAbono()" class="w-full ${editandoPagoIdx!==null?'bg-orange-500':'bg-green-600'} text-white py-5 rounded-[1.5rem] font-black uppercase tracking-widest active:scale-95 transition-transform">${editandoPagoIdx!==null?'Actualizar Pago':'Confirmar Cobro'}</button>
                    </div>
                    <div class="space-y-3">${p.historial.map((reg, idx) => `
                        <div class="bg-white p-5 rounded-[2rem] border border-slate-50 shadow-sm">
                            <div class="flex justify-between items-center mb-2">
                                <div><p class="text-[9px] text-slate-400 font-black">${reg.fecha}</p><p class="text-xl font-black text-green-600 italic">$${reg.monto.toFixed(2)}</p></div>
                                <div class="flex gap-1">
                                    <button onclick="prepararRecibo('${p.nombre}', ${reg.monto}, ${reg.saldoDespues}, '${reg.fecha}')" class="w-10 h-10 bg-green-50 rounded-xl flex items-center justify-center"><img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" class="ws-icon"></button>
                                    <button onclick="prepararEdicion(${idx})" class="w-10 h-10 bg-orange-50 rounded-xl flex items-center justify-center text-orange-500 text-xs">✏️</button>
                                    <button onclick="eliminarPago(${idx})" class="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center text-red-500 text-xs font-black">🗑️</button>
                                </div>
                            </div>
                            <div class="flex justify-between text-[8px] font-black uppercase text-slate-400 border-t pt-2 mt-1"><span>CAPITAL: $${reg.cobroCapital.toFixed(2)}</span><span>RESTANTE: $${reg.saldoDespues.toFixed(2)}</span></div>
                        </div>`).join('')}</div>
                </div>`;
            } else if (vista === 'formulario') {
                const edit = idActivo ? db.find(x=>x.id===idActivo) : null;
                h = `<div class="max-w-md mx-auto p-6 animate-fade">
                    <h2 class="text-2xl font-black uppercase italic mb-8 text-center">${edit?'Ficha del':'Nuevo'} Cliente</h2>
                    <div class="bg-white p-10 rounded-[3rem] shadow-2xl space-y-4">
                        <input id="f-nom" value="${edit?edit.nombre:''}" placeholder="NOMBRE COMPLETO" class="w-full p-4 bg-slate-50 rounded-2xl font-black text-center text-xs outline-none uppercase">
                        <input id="f-sal" value="${edit?edit.saldo:''}" type="number" placeholder="SALDO INICIAL $" class="w-full p-4 bg-slate-50 rounded-2xl font-black text-center outline-none">
                        <select id="f-tas" class="w-full p-4 bg-slate-50 rounded-2xl font-black text-center outline-none"><option value="0.05" ${edit?.tasa===0.05?'selected':''}>5%</option><option value="0.10" ${edit?.tasa===0.10?'selected':''}>10%</option><option value="0.15" ${edit?.tasa===0.15?'selected':''}>15%</option></select>
                        <button onclick="guardarRegistro(${idActivo})" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase shadow-lg">Guardar Datos</button>
                        ${edit ? `<button onclick="eliminarRegistroCompleto(${idActivo})" class="w-full bg-red-50 text-red-500 py-4 rounded-2xl font-black uppercase text-[10px] mt-4">🗑️ Eliminar Cliente</button>` : ''}
                        <button onclick="navegar('dashboard')" class="w-full text-slate-400 font-black text-[10px] uppercase text-center mt-4 tracking-widest">Regresar</button>
                    </div>
                </div>`;
            }
            root.innerHTML = h;
        }

        function registrarAbono() {
            const m = parseFloat(document.getElementById('monto-pago').value);
            if (isNaN(m) || m <= 0) return;
            const p = db.find(x => x.id === idActivo);
            if(editandoPagoIdx !== null) { p.saldo += p.historial[editandoPagoIdx].cobroCapital; p.historial.splice(editandoPagoIdx, 1); }
            const interes = p.saldo * p.tasa;
            let pI = Math.min(m, interes), pC = Math.max(0, m - pI);
            p.saldo -= pC;
            p.estado = p.saldo <= 0.05 ? 'pagado' : 'activo';
            const fInput = document.getElementById('fecha-pago').value;
            const fFinal = fInput ? fInput.split('-').reverse().join('/') : new Date().toLocaleDateString('es-ES');
            p.historial.unshift({ id: Date.now(), fecha: fFinal, monto: m, cobroInteres: pI, cobroCapital: pC, saldoDespues: p.saldo });
            editandoPagoIdx = null; syncCloud().then(() => render());
        }

        function guardarRegistro(id) {
            const n = document.getElementById('f-nom').value;
            const s = parseFloat(document.getElementById('f-sal').value);
            const t = parseFloat(document.getElementById('f-tas').value);
            if(!n || isNaN(s)) return alert("Completa los datos");
            if(id) { const p = db.find(x=>x.id===id); p.nombre = n; p.saldo = s; p.tasa = t; } 
            else { db.push({id:Date.now(), nombre:n, saldo:s, tasa:t, estado:'activo', historial:[]}); }
            syncCloud().then(()=>navegar('dashboard'));
        }

        function prepararRecibo(n, m, s, f) {
            document.getElementById('contenido-recibo').innerHTML = `
                <h2 class="font-bold border-b pb-2 text-[10px] uppercase text-slate-400">RECIBO PRESTAPP</h2>
                <div class="text-left text-[11px] my-4 space-y-1 font-bold uppercase italic">
                    <p>FECHA: ${f}</p>
                    <p>CLIENTE: ${n}</p>
                </div>
                <h1 class="text-4xl font-black my-2 tracking-tighter">$${m.toFixed(2)}</h1>
                <p class="text-[9px] font-black text-green-600 mb-2">¡GRACIAS POR SU PAGO!</p>
                <p>-------------------------</p>
                <p class="text-[10px] uppercase font-black text-slate-500">DEUDA PENDIENTE: $${s.toFixed(2)}</p>`;
            document.getElementById('modal-recibo').style.display = 'flex';
        }

        function prepararCapturaCalc() {
            document.getElementById('contenido-recibo').innerHTML = `
                <h2 class="font-bold border-b pb-2 text-[10px] uppercase text-slate-400">PROYECCIÓN DE PAGO</h2>
                <div class="bg-slate-50 p-4 rounded-xl text-left font-black uppercase text-[10px] mt-4">${document.getElementById('c-res').innerHTML}</div>`;
            document.getElementById('modal-recibo').style.display = 'flex';
        }

        function cerrarModal() { document.getElementById('modal-recibo').style.display = 'none'; }
        async function compartirImagen() {
            const area = document.getElementById('area-captura');
            const canvas = await html2canvas(area);
            canvas.toBlob(async (blob) => {
                const file = new File([blob], 'prestapp.png', { type: 'image/png' });
                if (navigator.share) await navigator.share({ files: [file], title: 'Recibo PrestApp' });
            });
        }
        window.onload = () => { fetchCloud(); };
    </script>
</body>
</html>
