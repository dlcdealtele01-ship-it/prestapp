<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PrestApp Cloud v26 - Proyección Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .modal-overlay { background: rgba(0,0,0,0.85); display: none; position: fixed; inset: 0; z-index: 100; justify-content: center; align-items: center; }
        .animate-fade { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #cbd5e1; transition: .4s; border-radius: 20px; }
        input:checked + .slider { background-color: #ef4444; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(22px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="app-root">
        <div class="min-h-screen flex items-center justify-center font-black text-indigo-600 animate-pulse uppercase tracking-widest text-xs">Sincronizando Proyecciones...</div>
    </div>

    <div id="modal-recibo" class="modal-overlay p-4">
        <div class="flex flex-col items-center w-full max-w-xs">
            <div id="recibo-visual" class="p-8 bg-white text-black shadow-2xl mb-6 border-t-8 border-slate-900 w-full text-center italic" style="font-family: monospace;">
                <h2 class="font-bold border-b pb-2 text-sm uppercase text-slate-400">Comprobante</h2>
                <div class="text-left text-[11px] my-4 space-y-1 font-bold uppercase">
                    <p>FECHA: <span id="r-fecha"></span></p>
                    <p>CLIENTE: <span id="r-cliente"></span></p>
                </div>
                <h1 class="text-4xl font-black my-2">$<span id="r-monto"></span></h1>
                <p>-------------------------</p>
                <p class="text-[10px] uppercase font-bold text-slate-500">Saldo Restante</p>
                <p class="text-xl font-bold">$<span id="r-saldo"></span></p>
                <p class="mt-8 text-[8px] opacity-40 italic">v26 - Inteligencia Financiera</p>
            </div>
            <div class="flex gap-2 w-full">
                <button onclick="cerrarModal()" class="flex-1 bg-slate-700 text-white py-4 rounded-xl text-[10px] font-black uppercase">Cerrar</button>
                <button onclick="compartirImagen()" class="flex-[2] bg-green-600 text-white py-4 rounded-xl text-[10px] font-black shadow-lg uppercase">WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://jppaqmfagtbvkxjkrdfd.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwcGFxbWZhZ3Ridmt4amtyZGZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTYyMTEsImV4cCI6MjA5MDI5MjIxMX0.ME7iJkLB7v1Jg3KhL2a-FoU1bCNhA1GR8vQDBt3tNdI";
        const SECRET_TAG = "mis_datos_privados_777";
        const MASTER_HASH = "898492087612f1228490a02059080708f75b871900f6e69317094054a3233824";

        let db = [], vista = 'dashboard', subVista = 'activos', idActivo = null, editandoPagoIndex = null;
        let isLoggedIn = sessionStorage.getItem('isLoggedIn') === 'true';

        function obtenerDatosMora(p) {
            if (!p || p.estado === 'pagado' || p.saldo <= 0) return { esMoroso: false, multiplicador: 1 };
            const hoy = new Date();
            const ultimaFechaStr = p.historial.length > 0 ? p.historial[0].fecha : new Date(p.id).toLocaleDateString('es-ES');
            const [d, m, a] = ultimaFechaStr.split('/').map(Number);
            const ultimaFecha = new Date(a, m - 1, d);
            const diffDias = Math.ceil(Math.abs(hoy - ultimaFecha) / (1000 * 60 * 60 * 24));
            let multiplicador = Math.floor(diffDias / 15);
            if (multiplicador < 1) multiplicador = 1;
            const dia = hoy.getDate();
            const moraQ1 = (dia >= 17 && dia <= 30 && ultimaFecha.getDate() < 15);
            const moraQ2 = ((dia >= 2 && dia < 17) && (ultimaFecha.getDate() < 28 && (ultimaFecha.getMonth() !== hoy.getMonth() || ultimaFecha.getFullYear() !== hoy.getFullYear())));
            return { esMoroso: (moraQ1 || moraQ2 || diffDias > 20), multiplicador: multiplicador };
        }

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function login(e) {
            if(e) e.preventDefault();
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value.trim();
            const inputHash = await sha256(u + ":" + p);
            if (inputHash === MASTER_HASH || (u === "ruthnoemic" && p === "Hibrju05.")) {
                isLoggedIn = true;
                sessionStorage.setItem('isLoggedIn', 'true');
                fetchCloud();
            } else { alert("Acceso Denegado"); }
        }

        function logout() { sessionStorage.clear(); location.reload(); }

        async function fetchCloud() {
            if (!isLoggedIn) { render(); return; }
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/prestapp_data?clave_secreta=eq.${SECRET_TAG}&select=datos`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                const json = await res.json();
                if (json && json[0]) db = json[0].datos || [];
            } catch (e) { }
            render();
        }

        async function syncCloud() {
            localStorage.setItem('PRESTAPP_LOCAL', JSON.stringify(db));
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/prestapp_data?clave_secreta=eq.${SECRET_TAG}`, {
                    method: 'PATCH',
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ datos: db })
                });
            } catch (e) { }
        }

        function navegar(v, id = null) { vista = v; idActivo = id; editandoPagoIndex = null; render(); }

        function toggleMoraVisual() {
            const p = db.find(x => x.id === idActivo);
            const check = document.getElementById('mora-switch');
            const displaySaldo = document.getElementById('detalle-saldo');
            const { multiplicador } = obtenerDatosMora(p);
            
            if (check.checked) {
                const interes = p.saldo * (p.tasa * multiplicador);
                displaySaldo.innerText = (p.saldo + interes).toFixed(2);
                displaySaldo.classList.add('text-red-400');
            } else {
                displaySaldo.innerText = p.saldo.toFixed(2);
                displaySaldo.classList.remove('text-red-400');
            }
        }

        function sugerirPagoTotal() {
            const displaySaldo = document.getElementById('detalle-saldo');
            document.getElementById('monto-abono').value = displaySaldo.innerText;
        }

        function registrarAbono() {
            const inputMonto = document.getElementById('monto-abono');
            const checkMora = document.getElementById('mora-switch');
            const m = parseFloat(inputMonto.value);
            if (isNaN(m) || m <= 0) return;
            const p = db.find(x => x.id === idActivo);

            if (editandoPagoIndex !== null) {
                const viejo = p.historial[editandoPagoIndex];
                p.saldo = (p.saldo + viejo.monto) - (viejo.interesEnEseMomento || 0);
                p.historial.splice(editandoPagoIndex, 1);
            }

            const { multiplicador } = obtenerDatosMora(p);
            const interesAplicado = checkMora.checked ? (p.saldo * (p.tasa * multiplicador)) : 0;
            
            p.saldo = (p.saldo + interesAplicado) - m;
            p.estado = p.saldo <= 0.05 ? 'pagado' : 'activo';
            if(p.saldo <= 0.05) p.saldo = 0;
            
            p.historial.unshift({ 
                fecha: new Date().toLocaleDateString('es-ES'), 
                monto: m, 
                interesEnEseMomento: interesAplicado,
                moraX: checkMora.checked ? multiplicador : 0,
                saldoDespues: p.saldo 
            });
            
            editandoPagoIndex = null;
            syncCloud(); render();
        }

        function render() {
            const root = document.getElementById('app-root');
            if (!isLoggedIn) {
                root.innerHTML = `<div class="min-h-screen flex items-center justify-center p-6 bg-slate-900 animate-fade">
                    <div class="w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-2xl text-center">
                        <h1 class="text-4xl font-black italic uppercase text-slate-900">PREST<span class="text-emerald-500">APP</span></h1>
                        <form onsubmit="login(event)" class="mt-8 space-y-4 text-left font-bold">
                            <input id="user" type="text" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none" placeholder="Usuario" required>
                            <input id="pass" type="password" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none" placeholder="Contraseña" required>
                            <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-2xl uppercase text-[10px] tracking-widest font-black italic">Entrar</button>
                        </form>
                    </div>
                </div>`;
                return;
            }

            const activos = db.filter(p => p.estado !== 'pagado');
            const morosos = activos.filter(p => obtenerDatosMora(p).esMoroso);
            const completados = db.filter(p => p.estado === 'pagado');
            
            const capCalle = activos.reduce((acc, p) => acc + p.saldo, 0);
            const gananciaProyectada = activos.reduce((acc, p) => acc + (p.saldo * p.tasa), 0);

            let h = `<header class="bg-slate-900 text-white p-6 sticky top-0 z-40 flex justify-between items-center border-b border-white/5">
                <h1 class="font-black italic text-xl uppercase tracking-tighter">PREST<span class="text-emerald-500">APP</span></h1>
                <button onclick="logout()" class="text-[9px] font-black text-red-400 border border-red-900 px-3 py-1 rounded-lg uppercase">Salir</button>
            </header>
            <div class="max-w-md mx-auto p-4 pb-32 animate-fade">`;

            if (vista === 'dashboard') {
                h += `
                <div class="bg-slate-900 p-6 rounded-[2.5rem] mb-6 shadow-2xl border border-white/10 space-y-4">
                    <p class="text-[9px] uppercase font-black text-indigo-400 italic mb-1 tracking-widest leading-none">Capital en Calle</p>
                    <p class="text-4xl font-black text-white leading-none">$${capCalle.toLocaleString('en-US', {minimumFractionDigits: 2})}</p>
                    <div class="flex gap-4 pt-4 border-t border-white/5 text-[10px] font-black uppercase italic">
                        <div class="flex-1"><p class="text-emerald-400 mb-1">Ganancia Est.</p><p class="text-white">$${gananciaProyectada.toLocaleString('en-US', {minimumFractionDigits: 2})}</p></div>
                        <div class="flex-1"><p class="text-indigo-300 mb-1">Recaudación</p><p class="text-white">$${(capCalle + gananciaProyectada).toLocaleString('en-US', {minimumFractionDigits: 2})}</p></div>
                    </div>
                </div>

                <button onclick="navegar('formulario')" class="w-full bg-indigo-600 text-white font-black py-5 rounded-[2rem] mb-8 text-[11px] uppercase tracking-widest shadow-xl">+ Nuevo Registro</button>
                
                <div class="flex gap-2 mb-6 bg-slate-200 p-1 rounded-2xl font-black text-[9px] uppercase italic">
                    <button onclick="subVista='activos';render()" class="flex-1 py-3 rounded-xl ${subVista==='activos'?'bg-white text-indigo-600 shadow-sm':'text-slate-500'}">Activos</button>
                    <button onclick="subVista='morosos';render()" class="flex-1 py-3 rounded-xl ${subVista==='morosos'?'bg-white text-red-600 shadow-sm':'text-slate-500'}">Morosos</button>
                    <button onclick="subVista='pagados';render()" class="flex-1 py-3 rounded-xl ${subVista==='pagados'?'bg-white text-emerald-600 shadow-sm':'text-slate-500'}">Pagos</button>
                </div>`;

                let lista = subVista === 'morosos' ? morosos : (subVista === 'pagados' ? completados : activos);
                
                lista.forEach(p => {
                    const { esMoroso } = obtenerDatosMora(p);
                    h += `<div onclick="navegar('detalle', ${p.id})" class="bg-white p-5 rounded-3xl shadow-sm mb-4 flex justify-between items-center border-l-[6px] ${p.estado==='pagado'?'border-l-emerald-500':(esMoroso?'border-l-red-500':'border-l-indigo-500')} cursor-pointer">
                        <div class="flex-1 font-black text-slate-800 uppercase text-xs">${p.nombre} ${esMoroso?'⚠️':''}<p class="text-[8px] text-slate-400 mt-1 italic">${p.estado==='pagado'?'TOTALMENTE PAGADO':(p.tasa*100).toFixed(0)+'% quincenal'}</p></div>
                        <p class="text-lg font-black ${p.estado==='pagado'?'text-emerald-500':'text-slate-900'}">$${p.saldo.toFixed(2)}</p>
                    </div>`;
                });
            } else if (vista === 'detalle') {
                const p = db.find(x => x.id === idActivo);
                const { esMoroso, multiplicador } = obtenerDatosMora(p);
                const gananciaMora = p.saldo * (p.tasa * multiplicador);

                h += `<div class="flex justify-between items-center mb-6 font-black text-[10px] uppercase">
                    <button onclick="navegar('dashboard')" class="bg-slate-200 px-4 py-2 rounded-xl">← Volver</button>
                    <div class="flex gap-2">
                        <button onclick="navegar('formulario', ${p.id})" class="text-indigo-600 p-2 bg-indigo-50 rounded-lg italic font-black">Editar</button>
                        <button onclick="if(confirm('¿Borrar?')){db=db.filter(x=>x.id!==${p.id});syncCloud();navegar('dashboard');}" class="text-red-500 p-2 bg-red-50 rounded-lg italic font-black">Borrar</button>
                    </div>
                </div>
                <div class="${p.estado==='pagado'?'bg-emerald-600':'bg-slate-900'} p-10 rounded-[3rem] text-white shadow-2xl text-center mb-6 relative overflow-hidden transition-all">
                    <p class="text-white/50 text-[10px] font-black uppercase mb-1 tracking-widest">${p.nombre}</p>
                    <h2 class="text-5xl font-black tracking-tighter">$<span id="detalle-saldo">${p.saldo.toFixed(2)}</span></h2>
                </div>

                ${esMoroso ? `<div class="bg-amber-50 border border-amber-200 p-4 rounded-2xl mb-6 flex items-center gap-3 animate-fade">
                    <div class="bg-amber-500 text-white p-2 rounded-full text-lg">⚠️</div>
                    <div>
                        <p class="text-[9px] font-black uppercase text-amber-600 mb-1">Morosidad Detectada (${multiplicador}x)</p>
                        <p class="text-[11px] font-bold text-slate-800 italic">Interés sugerido: <span class="text-red-600">$${gananciaMora.toFixed(2)}</span></p>
                    </div>
                </div>` : ''}

                <div class="bg-white p-6 rounded-[2.5rem] shadow-md mb-8 space-y-5">
                    <div class="flex justify-between items-center px-1">
                         <label class="text-[10px] font-black uppercase text-slate-400 italic tracking-widest">Interés por Mora</label>
                         <label class="switch"><input type="checkbox" id="mora-switch" onchange="toggleMoraVisual()"><span class="slider"></span></label>
                    </div>
                    <div class="flex gap-2">
                         <input id="monto-abono" type="number" placeholder="Monto a cobrar $" class="flex-[2] p-4 bg-slate-50 rounded-2xl font-black outline-none border focus:border-indigo-500">
                         <button onclick="sugerirPagoTotal()" class="flex-1 bg-indigo-100 text-indigo-600 rounded-2xl text-[8px] font-black uppercase italic">Sugerir Total</button>
                    </div>
                    <button id="btn-cobrar" onclick="registrarAbono()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black text-[11px] uppercase shadow-lg italic tracking-widest">Confirmar Cobro</button>
                </div>

                <div class="space-y-4 pb-20">
                    <p class="text-[10px] text-slate-400 uppercase font-black ml-2 italic tracking-widest leading-none">Historial de Movimientos</p>
                    ${p.historial.map((reg, idx) => `
                    <div class="bg-white p-4 rounded-3xl flex justify-between items-center shadow-sm border border-slate-100">
                        <div>
                            <p class="text-[8px] text-slate-400 font-black uppercase mb-1">${reg.fecha} ${reg.moraX > 0 ? `<span class="text-red-500">[+${reg.moraX}x MORA]</span>` : ''}</p>
                            <p class="text-lg font-black text-emerald-600 italic leading-none">$${reg.monto.toFixed(2)}</p>
                            <p class="text-[8px] text-slate-400 font-bold mt-2 italic">Saldo restante: $${(reg.saldoDespues || 0).toFixed(2)}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="prepararEdicionPago(${idx})" class="w-10 h-10 bg-slate-50 border border-slate-200 rounded-xl flex items-center justify-center text-indigo-500"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></button>
                            <button onclick="eliminarAbono(${p.id}, ${idx})" class="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center text-red-500"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg></button>
                            <button onclick="mostrarRecibo('${p.nombre}', ${reg.monto}, ${reg.saldoDespues}, '${reg.fecha}')" class="w-10 h-10 bg-green-50 rounded-xl flex items-center justify-center"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="w-6 h-6"></button>
                        </div>
                    </div>`).join('')}
                </div>`;
            } else if (vista === 'formulario') {
                const e = idActivo ? db.find(x => x.id === idActivo) : null;
                h += `<div class="bg-white p-8 rounded-[3rem] shadow-xl space-y-6">
                    <h2 class="text-xl font-black text-center uppercase italic">${idActivo?'Actualizar':'Crear'} Préstamo</h2>
                    <form onsubmit="handleForm(event)" class="space-y-4 font-black text-[10px] uppercase italic tracking-widest">
                        <input id="f-nombre" value="${e?e.nombre:''}" class="w-full p-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-200 focus:ring-indigo-500" placeholder="Nombre del Cliente" required>
                        <input id="f-saldo" type="number" step="0.01" value="${e?e.saldo:''}" class="w-full p-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-200 focus:ring-indigo-500" placeholder="Monto Inicial $" required>
                        <div class="flex gap-2">
                             <select id="f-tasa" class="flex-1 p-4 bg-slate-50 rounded-2xl outline-none ring-1 ring-slate-200">
                                <option value="0.05" ${e&&e.tasa==0.05?'selected':''}>5% Quincenal</option>
                                <option value="0.10" ${e&&e.tasa==0.10?'selected':''}>10% Quincenal</option>
                            </select>
                        </div>
                        <div class="flex gap-4 pt-6">
                            <button type="button" onclick="navegar('dashboard')" class="flex-1 text-slate-400 font-black">Cancelar</button>
                            <button type="submit" class="flex-[2] bg-indigo-600 text-white py-4 rounded-2xl shadow-lg uppercase">Guardar</button>
                        </div>
                    </form>
                </div>`;
            }
            root.innerHTML = h + "</div>";
        }

        function mostrarRecibo(n, m, s, f) {
            document.getElementById('r-cliente').innerText = n;
            document.getElementById('r-monto').innerText = m.toFixed(2);
            document.getElementById('r-saldo').innerText = s.toFixed(2);
            document.getElementById('r-fecha').innerText = f;
            document.getElementById('modal-recibo').style.display = 'flex';
        }
        function cerrarModal() { document.getElementById('modal-recibo').style.display = 'none'; }
        async function compartirImagen() {
            const ticket = document.getElementById('recibo-visual');
            const canvas = await html2canvas(ticket);
            canvas.toBlob(async (blob) => {
                const file = new File([blob], 'recibo.png', { type: 'image/png' });
                if (navigator.share) await navigator.share({ files: [file], title: 'Recibo' });
            });
        }
        window.onload = fetchCloud;
    </script>
</body>
</html>
