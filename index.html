<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prestapp Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.02em; }
        .hidden { display: none !important; }
        dialog::backdrop { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); }
        .card-shadow { box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.05); }
        label { display: block; text-align: left; font-weight: 800; text-transform: uppercase; font-size: 10px; color: #94a3b8; margin-bottom: 4px; margin-left: 8px; }
        .badge-mora { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen text-slate-900">

    <script>
        const supabaseUrl = 'https://jppaqmfagtbvkxjkrdfd.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwcGFxbWZhZ3Ridmt4amtyZGZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTYyMTEsImV4cCI6MjA5MDI5MjIxMX0.ME7iJkLB7v1Jg3KhL2a-FoU1bCNhA1GR8vQDBt3tNdI';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);
    </script>

    <div id="authScreen" class="min-h-screen flex items-center justify-center p-6 bg-slate-50 fixed inset-0 z-[100]">
        <div class="bg-white p-8 rounded-[2.5rem] border card-shadow w-full max-w-sm text-center">
            <div class="flex flex-col items-center mb-8">
                <div class="flex items-center gap-1">
                    <span class="text-2xl font-extrabold text-slate-950 tracking-tighter uppercase">Prest<span class="text-emerald-500">app</span></span>
                    <i class="ph-fill ph-lightning text-2xl text-amber-400"></i>
                </div>
            </div>
            <div class="space-y-4">
                <input type="email" id="authEmail" placeholder="Correo" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none">
                <input type="password" id="authPassword" placeholder="Contraseña" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="handleAuth('login')" class="p-4 bg-slate-900 text-white rounded-2xl font-black uppercase text-xs">Entrar</button>
                    <button onclick="handleAuth('signup')" class="p-4 bg-white border border-slate-200 rounded-2xl font-black uppercase text-xs">Unirse</button>
                </div>
                <button onclick="handleResetPassword()" class="text-[10px] font-black text-slate-400 uppercase hover:text-blue-500 transition">¿Olvidaste tu contraseña?</button>
            </div>
            <p id="authError" class="text-red-500 text-[10px] font-bold mt-4 uppercase"></p>
        </div>
    </div>

    <div id="mainApp" class="hidden">
        <nav class="bg-white border-b p-4 sticky top-0 z-50 flex justify-between items-center shadow-sm">
            <div class="flex flex-col items-start">
                <div class="flex items-center gap-1">
                    <span class="text-xl font-extrabold text-slate-950 tracking-tighter uppercase">Prest<span class="text-emerald-500">app</span></span>
                    <i class="ph-fill ph-lightning text-xl text-amber-400"></i>
                </div>
                <span class="text-[10px] text-slate-400 italic font-medium -mt-1 ml-1">by GierelAxel.dev</span>
            </div>
            <div class="flex items-center gap-3">
                <div class="flex items-center bg-slate-100 rounded-full px-2 border">
                    <select id="selectCartera" onchange="cambiarCartera(this.value)" class="bg-transparent text-[10px] font-black uppercase px-2 py-2 outline-none"></select>
                    <button onclick="document.getElementById('modalCartera').showModal()" class="text-blue-600 p-1"><i class="ph-bold ph-plus-circle text-xl"></i></button>
                </div>
                <button onclick="handleLogout()" class="p-2 text-red-400"><i class="ph-bold ph-power text-xl"></i></button>
            </div>
        </nav>

        <main id="viewDashboard" class="max-w-5xl mx-auto p-4 md:p-8">
            <div class="grid grid-cols-2 gap-4 md:gap-8 mb-8 text-center">
                <div class="bg-white p-6 md:p-10 rounded-[2.5rem] border card-shadow">
                    <p class="text-[9px] font-black uppercase text-slate-400">Capital Activo</p>
                    <h2 id="totalCapital" class="text-2xl md:text-4xl font-black tracking-tight">$0.00</h2>
                </div>
                <div class="bg-white p-6 md:p-10 rounded-[2.5rem] border card-shadow">
                    <p class="text-[9px] font-black uppercase text-slate-400">Interés Proyectado</p>
                    <h2 id="totalIntereses" class="text-2xl md:text-4xl font-black text-emerald-600 tracking-tight">$0.00</h2>
                </div>
            </div>
            <div class="bg-white rounded-[2.5rem] border overflow-hidden card-shadow">
                <table class="w-full text-left">
                    <tbody id="listaPrestamos" class="divide-y divide-slate-50"></tbody>
                </table>
            </div>
            <button onclick="abrirModalNuevo()" class="fixed bottom-8 right-8 bg-slate-900 text-white w-16 h-16 rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition z-40"><i class="ph-bold ph-plus text-2xl"></i></button>
        </main>

        <main id="viewHistorial" class="hidden max-w-2xl mx-auto p-6">
            <button onclick="cerrarHistorial()" class="mb-6 font-black text-[10px] text-slate-400 uppercase flex items-center gap-2"><i class="ph-bold ph-caret-left"></i> Volver</button>
            <div class="bg-white p-8 rounded-[2.5rem] border mb-6 text-center card-shadow relative">
                <button onclick="abrirModalEditar()" class="absolute top-6 right-6 text-slate-300 hover:text-blue-500"><i class="ph-bold ph-pencil-simple text-xl"></i></button>
                <h2 id="histNombre" class="text-3xl font-black uppercase italic tracking-tighter"></h2>
                <p id="histSaldo" class="text-emerald-600 font-black text-xl mt-1"></p>
                <button onclick="eliminarPrestamoCompleto()" class="mt-4 text-[10px] font-black text-red-200 uppercase">Eliminar Préstamo</button>
            </div>
            <div id="listaPagosHistorial" class="space-y-3"></div>
        </main>
    </div>

    <dialog id="modalPago" class="rounded-[2.5rem] p-8 w-full max-w-xs border-none text-center relative">
        <button onclick="this.closest('dialog').close()" class="absolute top-6 right-6 text-slate-300"><i class="ph-bold ph-x text-xl"></i></button>
        <h3 id="pagoTitle" class="font-black uppercase mb-4 italic text-slate-400 text-[10px]">Registrar Abono</h3>
        <div class="space-y-4 mb-6">
            <div>
                <label>Fecha del Pago</label>
                <input type="date" id="fechaPago" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold text-sm outline-none text-center">
            </div>
            <div class="flex items-center justify-center gap-2">
                <input type="checkbox" id="checkTodoCapital" class="accent-slate-900"> 
                <span class="text-[10px] font-black uppercase text-slate-400">100% Capital</span>
            </div>
            <input type="number" id="montoPago" placeholder="0.00" class="w-full p-6 bg-slate-100 rounded-[2rem] font-black text-4xl text-center outline-none">
        </div>
        <button onclick="confirmarPago()" class="w-full p-5 bg-slate-900 text-white rounded-[1.5rem] font-black uppercase shadow-lg">Confirmar</button>
    </dialog>

    <dialog id="modalReciboImagen" class="rounded-[2.5rem] p-0 border-none overflow-hidden text-center relative">
        <div class="bg-slate-50 p-6 flex flex-col items-center">
            <div class="bg-white p-8 rounded-3xl shadow-xl w-80 text-left border border-slate-100">
                <div class="text-center mb-6">
                    <span class="text-[10px] font-black uppercase text-emerald-500 tracking-widest">Comprobante de Pago</span>
                    <h2 id="reciboCliente" class="text-xl font-black uppercase italic mt-1 text-slate-900"></h2>
                </div>
                <div class="space-y-3 border-y py-4 border-dashed border-slate-200 text-sm">
                    <div class="flex justify-between"><span>MONTO RECIBIDO</span><span id="reciboMonto" class="font-black text-emerald-600"></span></div>
                    <div class="flex justify-between"><span>FECHA</span><span id="reciboFechaSimple" class="font-black"></span></div>
                </div>
                <div class="mt-4 bg-slate-900 p-4 rounded-2xl text-center">
                    <p class="text-[8px] font-black text-slate-400 uppercase">Saldo Pendiente</p>
                    <p id="reciboSaldo" class="text-2xl font-black text-white"></p>
                </div>
            </div>
        </div>
        <div class="p-6 bg-white flex flex-col gap-2">
            <button id="btnCompartirWA" class="w-full p-4 bg-[#25D366] text-white rounded-2xl font-black uppercase flex items-center justify-center gap-2">
                <i class="ph-bold ph-whatsapp-logo text-xl"></i> WhatsApp
            </button>
            <button onclick="this.closest('dialog').close()" class="w-full text-[10px] font-black text-slate-300 uppercase">Cerrar</button>
        </div>
    </dialog>

    <dialog id="modalForm" class="rounded-[2.5rem] p-8 w-full max-w-sm border-none relative">
        <button onclick="this.closest('dialog').close()" class="absolute top-6 right-6 text-slate-300"><i class="ph-bold ph-x text-xl"></i></button>
        <h3 id="formTitle" class="font-black mb-6 uppercase italic text-xl text-center">Datos Préstamo</h3>
        <div class="space-y-4">
            <div><label>Cliente</label><input type="text" id="formNombre" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none"></div>
            <div><label>Monto</label><input type="number" id="formMonto" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none"></div>
            <div class="grid grid-cols-2 gap-2">
                <div><label>Interés %</label><select id="formTasa" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none"><option value="20">20%</option><option value="15">15%</option></select></div>
                <div><label>Gracia</label><input type="number" id="formGracia" value="0" class="w-full p-4 bg-slate-50 border rounded-2xl font-bold outline-none"></div>
            </div>
            <button onclick="guardarPrestamo()" class="w-full p-5 bg-emerald-600 text-white rounded-2xl font-black uppercase">Guardar</button>
        </div>
    </dialog>

    <dialog id="modalCartera" class="rounded-[2.5rem] p-8 w-full max-w-xs border-none text-center relative">
        <button onclick="this.closest('dialog').close()" class="absolute top-6 right-6 text-slate-300"><i class="ph-bold ph-x text-xl"></i></button>
        <h3 class="font-black uppercase mb-4 italic text-slate-400 text-xs">Nueva Cartera</h3>
        <input type="text" id="nombreNuevaCartera" placeholder="Nombre" class="w-full p-4 bg-slate-50 border rounded-2xl mb-4 font-bold text-center outline-none">
        <button onclick="crearCartera()" class="w-full p-4 bg-blue-600 text-white rounded-2xl font-black uppercase">Crear</button>
    </dialog>

    <script>
        let currentUser = null, idCarteraActual = null, pActivo = null, idPagoAEditar = null;

        // INICIO Y AUTH
        async function init() {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                await cargarCarteras();
            } else {
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('mainApp').classList.add('hidden');
            }
        }

        async function handleAuth(type) {
            const email = authEmail.value, password = authPassword.value;
            if(!email || !password) return;
            const { error } = type === 'login' 
                ? await _supabase.auth.signInWithPassword({ email, password })
                : await _supabase.auth.signUp({ email, password });
            if (error) authError.innerText = error.message; else init();
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            location.reload();
        }

        async function handleResetPassword() {
            const email = authEmail.value;
            if(!email) return alert("Ingresa tu correo");
            await _supabase.auth.resetPasswordForEmail(email, { redirectTo: 'https://prestapp.space' });
            alert("Enlace enviado a tu correo.");
        }

        // CARTERAS Y DATOS
        async function cargarCarteras() {
            const { data } = await _supabase.from('carteras').select('*');
            if (data?.length) {
                idCarteraActual = data[0].id;
                selectCartera.innerHTML = data.map(c => `<option value="${c.id}">${c.nombre}</option>`).join('');
                cargarDatos();
            }
        }

        async function cargarDatos() {
            if (!idCarteraActual) return;
            const { data: prestamos } = await _supabase.from('prestamos').select('*, clientes(*), pagos(*)').eq('cartera_id', idCarteraActual);
            listaPrestamos.innerHTML = '';
            let tCap = 0, tInt = 0;
            prestamos?.forEach(p => {
                const calc = calcularSaldo(p); tCap += calc.capital; tInt += calc.interes;
                const mora = verificarMora(p.pagos, p.dias_gracia || 0);
                listaPrestamos.innerHTML += `<tr class="border-b border-slate-50 hover:bg-slate-50 cursor-pointer" onclick="verHistorial('${p.id}')">
                    <td class="p-6">
                        ${mora ? `<span class="badge-mora bg-red-100 text-red-600 text-[8px] font-black px-2 py-0.5 rounded-full block w-fit mb-1 uppercase">Pendiente</span>` : ''}
                        <div class="font-black uppercase text-[11px] text-slate-700">${p.clientes.nombre}</div>
                    </td>
                    <td class="p-6 text-right">
                        <div class="font-black text-sm">$${calc.capital.toFixed(2)}</div>
                        <div class="text-[9px] text-emerald-500 font-black">+$${calc.interes.toFixed(2)}</div>
                    </td>
                    <td class="p-6 w-10" onclick="event.stopPropagation()">
                        <button onclick="abrirModalPago('${p.id}')" class="bg-emerald-500 text-white p-2 rounded-2xl shadow-lg"><i class="ph-bold ph-hand-coins text-xl"></i></button>
                    </td>
                </tr>`;
            });
            totalCapital.innerText = `$${tCap.toFixed(2)}`;
            totalIntereses.innerText = `$${tInt.toFixed(2)}`;
        }

        // PAGOS Y LOGICA
        function abrirModalPago(id) {
            pActivo = {id}; idPagoAEditar = null;
            fechaPago.value = new Date().toISOString().split('T')[0];
            montoPago.value = '';
            modalPago.showModal();
        }

        function abrirEditarPago(id, monto, esCapital, fecha) {
            idPagoAEditar = id;
            montoPago.value = monto;
            fechaPago.value = new Date(fecha).toISOString().split('T')[0];
            document.getElementById('checkTodoCapital').checked = !esCapital;
            modalPago.showModal();
        }

        async function confirmarPago() {
            const m = parseFloat(montoPago.value), f = fechaPago.value;
            if(!m || !f) return;
            const checkCap = document.getElementById('checkTodoCapital').checked;
            const datos = { monto_pagado: m, fecha_pago: f, aplicar_interes: !checkCap };

            if(idPagoAEditar) await _supabase.from('pagos').update(datos).eq('id', idPagoAEditar);
            else await _supabase.from('pagos').insert([{ ...datos, prestamo_id: pActivo.id, user_id: currentUser.id }]);
            
            modalPago.close();
            if(pActivo.id) verHistorial(pActivo.id); else cargarDatos();
            if(!idPagoAEditar) abrirReciboVisual(m);
        }

        async function verHistorial(id) {
            const { data: p } = await _supabase.from('prestamos').select('*, clientes(*), pagos(*)').eq('id', id).single();
            pActivo = p; const calc = calcularSaldo(p);
            viewDashboard.classList.add('hidden'); viewHistorial.classList.remove('hidden');
            histNombre.innerText = p.clientes.nombre; histSaldo.innerText = `Saldo: $${calc.capital.toFixed(2)}`;
            listaPagosHistorial.innerHTML = p.pagos.sort((a,b) => new Date(b.fecha_pago) - new Date(a.fecha_pago)).map(pg => `
                <div class="bg-white p-5 rounded-[2.5rem] border flex justify-between items-center card-shadow">
                    <div>
                        <p class="text-[9px] font-black text-slate-300 uppercase">${new Date(pg.fecha_pago).toLocaleDateString('es-ES', {timeZone: 'UTC'})}</p>
                        <p class="text-xl font-black">$${parseFloat(pg.monto_pagado).toFixed(2)}</p>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="abrirEditarPago('${pg.id}', ${pg.monto_pagado}, ${pg.aplicar_interes}, '${pg.fecha_pago}')" class="text-slate-300 p-2"><i class="ph-bold ph-pencil-simple text-xl"></i></button>
                        <button onclick="abrirReciboVisual(${pg.monto_pagado})" class="text-emerald-500 p-2"><i class="ph-bold ph-whatsapp-logo text-2xl"></i></button>
                    </div>
                </div>`).join('');
        }

        function calcularSaldo(p) {
            let cap = parseFloat(p.monto_prestado), tasa = p.tasa_interes / 100;
            p.pagos?.sort((a,b) => new Date(a.fecha_pago) - new Date(b.fecha_pago)).forEach(pg => {
                if (pg.aplicar_interes) cap -= (pg.monto_pagado - (cap * tasa));
                else cap -= pg.monto_pagado;
            });
            return { capital: Math.max(0, cap), interes: Math.max(0, cap * tasa) };
        }

        function verificarMora(pagos, diasGracia) {
            const hoy = new Date(), d = hoy.getDate();
            const limite = 15 + parseInt(diasGracia);
            if (d <= limite) return false;
            return !pagos?.some(pg => {
                const fp = new Date(pg.fecha_pago);
                return fp.getUTCMonth() === hoy.getUTCMonth();
            });
        }

        async function abrirReciboVisual(monto) {
            reciboCliente.innerText = pActivo.clientes?.nombre || "Cliente";
            reciboMonto.innerText = `$${monto.toFixed(2)}`;
            reciboFechaSimple.innerText = new Date().toLocaleDateString();
            const { capital } = calcularSaldo(pActivo);
            reciboSaldo.innerText = `$${capital.toFixed(2)}`;
            modalReciboImagen.showModal();
            btnCompartirWA.onclick = () => {
                const msg = `*PAGO RECIBIDO*%0A*Cliente:* ${reciboCliente.innerText}%0A*Abono:* ${reciboMonto.innerText}%0A*Saldo actual:* ${reciboSaldo.innerText}`;
                window.open(`https://wa.me/?text=${msg}`, '_blank');
            };
        }

        // AUXILIARES
        function abrirModalNuevo() { pActivo = null; modalForm.showModal(); }
        async function guardarPrestamo() {
            const { data: cl } = await _supabase.from('clientes').insert([{ nombre: formNombre.value, user_id: currentUser.id, cartera_id: idCarteraActual }]).select().single();
            await _supabase.from('prestamos').insert([{ cliente_id: cl.id, cartera_id: idCarteraActual, user_id: currentUser.id, monto_prestado: formMonto.value, tasa_interes: formTasa.value, dias_gracia: formGracia.value }]);
            modalForm.close(); cargarDatos();
        }
        async function crearCartera() {
            await _supabase.from('carteras').insert([{ nombre: nombreNuevaCartera.value, user_id: currentUser.id }]);
            modalCartera.close(); cargarCarteras();
        }
        function cerrarHistorial() { viewHistorial.classList.add('hidden'); viewDashboard.classList.remove('hidden'); cargarDatos(); }
        function cambiarCartera(id) { idCarteraActual = id; cargarDatos(); }
        window.onload = init;
    </script>
</body>
</html>
