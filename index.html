<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PrestApp Cloud v21</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .modal-overlay { background: rgba(0,0,0,0.9); display: none; position: fixed; top:0; left:0; width:100%; height:100%; z-index: 100; justify-content: center; align-items: center; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <script>
        // CONFIGURACIÓN SUPABASE
        const SB_URL = "TU_URL_AQUÍ";
        const SB_KEY = "TU_ANON_KEY_AQUÍ";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);
    </script>

    <div id="app-root"></div>

    <!-- MODAL RECIBO -->
    <div id="modal-recibo" class="modal-overlay p-4">
        <div class="flex flex-col items-center w-full max-w-xs">
            <div id="recibo-visual" class="p-8 bg-white text-black shadow-2xl mb-6 border-t-8 border-slate-900 w-full text-center italic font-mono">
                <h2 class="font-bold border-b pb-2 text-sm uppercase">Comprobante de Pago</h2>
                <div class="text-left text-[11px] my-4 space-y-1 font-bold">
                    <p>FECHA: <span id="r-fecha"></span></p>
                    <p>CLIENTE: <span id="r-cliente"></span></p>
                </div>
                <p class="text-[10px] uppercase opacity-60">Monto</p>
                <h1 class="text-4xl font-black my-2">$<span id="r-monto"></span></h1>
                <p>-------------------------</p>
                <p class="text-xl font-bold">$<span id="r-saldo"></span></p>
                <p class="mt-8 text-[8px] opacity-40 uppercase">Gierel Axel.Dev Software</p>
            </div>
            <div class="flex gap-2 w-full">
                <button onclick="cerrarModal()" class="flex-1 bg-slate-700 text-white py-4 rounded-xl text-[10px] font-bold">CERRAR</button>
                <button onclick="compartirImagen()" class="flex-[2] bg-green-600 text-white py-4 rounded-xl text-[10px] font-bold shadow-lg uppercase">WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        let db = [], vista = 'dashboard', idActivo = null, user = null;

        async function checkSession() {
            const { data } = await supabase.auth.getSession();
            if (data.session) { user = data.session.user; await fetchCloud(); } 
            else { render(); }
        }

        async function login(e) {
            e.preventDefault();
            const { data, error } = await supabase.auth.signInWithPassword({
                email: document.getElementById('user').value,
                password: document.getElementById('pass').value
            });
            if (error) alert("Error: " + error.message);
            else { user = data.user; await fetchCloud(); }
        }

        async function fetchCloud() {
            const { data } = await supabase.from('prestapp_data').select('datos').eq('user_id', user.id).single();
            if (data) db = data.datos;
            else await supabase.from('prestapp_data').insert({ user_id: user.id, datos: [] });
            render();
        }

        async function sync() {
            await supabase.from('prestapp_data').update({ datos: db }).eq('user_id', user.id);
            render();
        }

        function navegar(v, id = null) { vista = v; idActivo = id; render(); }

        function saveForm(e) {
            e.preventDefault();
            const n = document.getElementById('f-n').value, s = parseFloat(document.getElementById('f-s').value), t = parseFloat(document.getElementById('f-t').value);
            if (idActivo) { let p = db.find(x => x.id === idActivo); p.nombre = n; p.saldo = s; p.tasa = t; } 
            else { db.push({ id: Date.now(), nombre: n, saldo: s, tasa: t, estado: 'activo', historial: [] }); }
            sync(); navegar('dashboard');
        }

        function pagar() {
            const m = parseFloat(document.getElementById('m-a').value);
            if (!m || m <= 0) return;
            let p = db.find(x => x.id === idActivo);
            p.saldo = (p.saldo + (p.saldo * p.tasa)) - m;
            if (p.saldo <= 0.05) { p.saldo = 0; p.estado = 'pagado'; }
            p.historial.unshift({ f: new Date().toLocaleDateString(), m: m, s: p.saldo });
            sync();
        }

        function render() {
            const root = document.getElementById('app-root');
            if (!user) {
                root.innerHTML = `<div class="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-900 text-center">
                    <div class="w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-2xl">
                        <h1 class="text-4xl font-black mb-0 italic uppercase">PREST<span class="text-indigo-600">APP</span></h1>
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-10">Por Gierel Axel.Dev</p>
                        <form onsubmit="login(event)" class="space-y-4 text-left">
                            <input id="user" type="email" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none" placeholder="Email" required>
                            <input id="pass" type="password" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none" placeholder="Contraseña" required>
                            <button class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl uppercase text-[10px]">Ingresar</button>
                        </form>
                    </div>
                </div>`;
                return;
            }

            const activos = db.filter(p => p.estado !== 'pagado');
            const totalC = activos.reduce((acc, p) => acc + p.saldo, 0);
            const totalG = activos.reduce((acc, p) => acc + (p.saldo * p.tasa), 0);

            let h = `<header class="bg-slate-900 text-white p-6 sticky top-0 z-40 flex justify-between items-center italic">
                <div><h1 class="text-xl font-black">PRESTAPP</h1><p class="text-[8px] text-indigo-400 font-bold uppercase tracking-widest leading-none mt-1">Gierel Axel.Dev</p></div>
                <button onclick="supabase.auth.signOut().then(()=>location.reload())" class="text-[9px] font-bold text-red-400 uppercase border border-red-900 px-2 py-1 rounded-lg tracking-tighter">Salir</button>
            </header>
            <div class="max-w-md mx-auto p-4 pb-32">`;

            if (vista === 'dashboard') {
                h += `<div class="bg-slate-800 p-6 rounded-[2rem] text-white shadow-xl mb-6 border-b-4 border-indigo-500 flex justify-between">
                    <div><p class="text-[9px] font-bold text-indigo-300 uppercase italic">Capital</p><p class="text-2xl font-black">$${totalC.toFixed(2)}</p></div>
                    <div class="text-right"><p class="text-[9px] font-bold text-green-400 uppercase italic">Interés Q.</p><p class="text-2xl font-black text-green-400">+$${totalG.toFixed(2)}</p></div>
                </div>
                <button onclick="navegar('formulario')" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl mb-6 shadow-lg text-xs uppercase italic tracking-widest">+ Nuevo Cliente</button>`;
                
                activos.forEach(p => {
                    h += `<div onclick="navegar('detalle', ${p.id})" class="bg-white p-5 rounded-2xl border mb-3 flex justify-between items-center border-l-4 border-indigo-500">
                        <div><p class="font-bold text-slate-800 uppercase tracking-tighter">${p.nombre}</p><p class="text-[10px] text-red-500 font-bold uppercase italic leading-none mt-1">Int: $${(p.saldo*p.tasa).toFixed(2)}</p></div>
                        <p class="text-xl font-black">$${p.saldo.toFixed(2)}</p>
                    </div>`;
                });
            } else if (vista === 'formulario') {
                const e = idActivo ? db.find(x => x.id === idActivo) : null;
                h += `<div class="bg-white p-8 rounded-[2.5rem] shadow-xl text-center">
                    <h2 class="text-xl font-black mb-8 italic uppercase underline decoration-indigo-500 underline-offset-8">${idActivo?'Editar':'Nuevo'}</h2>
                    <form onsubmit="saveForm(event)" class="space-y-4">
                        <input id="f-n" value="${e?e.nombre:''}" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold text-sm" placeholder="Nombre" required>
                        <input id="f-s" type="number" step="0.01" value="${e?e.saldo:''}" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold text-sm" placeholder="Saldo $" required>
                        <select id="f-t" class="w-full p-4 bg-slate-50 rounded-2xl border font-bold text-sm">
                            <option value="0.10" ${e&&e.tasa==0.1?'selected':''}>10% Quincenal</option>
                            <option value="0.15" ${e&&e.tasa==0.15?'selected':''}>15% Quincenal</option>
                        </select>
                        <div class="flex gap-4 pt-4"><button type="button" onclick="navegar('dashboard')" class="flex-1 text-gray-400 font-bold text-[10px]">VOLVER</button><button class="flex-[2] bg-indigo-600 text-white py-4 rounded-xl font-black text-[10px]">GUARDAR</button></div>
                    </form></div>`;
            } else if (vista === 'detalle') {
                const p = db.find(x => x.id === idActivo);
                h += `<div class="flex justify-between mb-4"><button onclick="navegar('dashboard')" class="font-black text-xs uppercase">← Volver</button>
                    <div class="flex gap-2"><button onclick="navegar('formulario', ${p.id})" class="bg-slate-200 px-3 py-1 rounded-xl text-[10px] font-bold">EDITAR</button>
                    <button onclick="if(confirm('¿Borrar?')){db=db.filter(x=>x.id!==${p.id});sync();navegar('dashboard');}" class="text-red-500 font-bold text-[10px] uppercase italic">Borrar</button></div></div>
                    <div class="bg-slate-900 p-10 rounded-[3rem] text-white text-center shadow-2xl mb-6 italic">
                        <p class="text-indigo-400 text-[9px] font-bold uppercase tracking-[0.3em] mb-1">${p.nombre}</p>
                        <h2 class="text-5xl font-black tracking-tighter">$${p.saldo.toFixed(2)}</h2>
                        <p class="text-[9px] text-red-400 font-bold uppercase mt-4">Interés a cobrar: $${(p.saldo*p.tasa).toFixed(2)}</p>
                    </div>
                    <div class="bg-white p-6 rounded-[2rem] border mb-6 flex gap-2">
                        <input id="m-a" type="number" placeholder="Monto $" class="flex-1 p-4 bg-slate-50 border rounded-xl font-bold text-sm">
                        <button onclick="pagar()" class="bg-green-600 text-white px-8 rounded-xl font-black text-xs uppercase">Pagar</button>
                    </div>
                    <div class="space-y-3 font-bold italic uppercase">
                        ${p.historial.map(r => `<div class="bg-white p-4 rounded-2xl flex justify-between items-center border shadow-sm">
                            <div><p class="text-[8px] text-gray-400">${r.f}</p><p class="text-sm">Abono: $${r.m.toFixed(2)}</p></div>
                            <button onclick="verRecibo('${p.nombre}', ${r.m}, ${r.s}, '${r.f}')" class="bg-green-50 p-3 rounded-xl"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="w-4 h-4"></button>
                        </div>`).join('')}
                    </div>`;
            }
            root.innerHTML = h + "</div>";
        }

        function verRecibo(n, m, s, f) {
            document.getElementById('r-fecha').innerText = f;
            document.getElementById('r-cliente').innerText = n;
            document.getElementById('r-monto').innerText = m.toFixed(2);
            document.getElementById('r-saldo').innerText = s.toFixed(2);
            document.getElementById('modal-recibo').style.display = 'flex';
        }

        function cerrarModal() { document.getElementById('modal-recibo').style.display = 'none'; }

        async function compartirImagen() {
            const canvas = await html2canvas(document.getElementById('recibo-visual'));
            canvas.toBlob(async (blob) => {
                const file = new File([blob]
