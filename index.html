<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PrestApp Cloud v20 - Control de Fechas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .modal-overlay { background: rgba(0,0,0,0.85); display: none; position: fixed; inset: 0; z-index: 100; justify-content: center; align-items: center; }
        .animate-fade { animation: fadeIn 0.2s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card-loan { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-loan:active { transform: scale(0.96); background-color: #f8fafc; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .rayo { display: inline-block; transform: translateY(-2px); }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #cbd5e1; transition: .4s; border-radius: 20px; }
        input:checked + .slider { background-color: #ef4444; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="app-root">
        <div class="min-h-screen flex items-center justify-center font-black text-indigo-600 animate-pulse uppercase tracking-widest text-xs">Conectando Sistema...</div>
    </div>

    <div id="modal-recibo" class="modal-overlay p-4">
        <div class="flex flex-col items-center w-full max-w-xs">
            <div id="recibo-visual" class="p-8 bg-white text-black shadow-2xl mb-6 border-t-8 border-slate-900 w-full text-center italic" style="font-family: monospace;">
                <h2 class="font-bold border-b pb-2 text-sm uppercase italic tracking-tighter text-slate-400">Comprobante Oficial</h2>
                <div class="text-left text-[11px] my-4 space-y-1 font-bold uppercase">
                    <p>FECHA: <span id="r-fecha"></span></p>
                    <p>CLIENTE: <span id="r-cliente"></span></p>
                </div>
                <h1 class="text-4xl font-black my-2">$<span id="r-monto"></span></h1>
                <p>-------------------------</p>
                <p class="text-[10px] uppercase font-bold text-slate-500">Capital Restante</p>
                <p class="text-xl font-bold">$<span id="r-saldo"></span></p>
                <p class="mt-8 text-[8px] opacity-40 italic uppercase tracking-widest">GierelAxel.dev Software</p>
            </div>
            <div class="flex gap-2 w-full">
                <button onclick="cerrarModal()" class="flex-1 bg-slate-700 text-white py-4 rounded-xl text-[10px] font-black uppercase tracking-widest">Cerrar</button>
                <button onclick="compartirImagen()" class="flex-[2] bg-green-600 text-white py-4 rounded-xl text-[10px] font-black shadow-lg uppercase tracking-widest">WhatsApp</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://jppaqmfagtbvkxjkrdfd.supabase.co"; 
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpwcGFxbWZhZ3Ridmt4amtyZGZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTYyMTEsImV4cCI6MjA5MDI5MjIxMX0.ME7iJkLB7v1Jg3KhL2a-FoU1bCNhA1GR8vQDBt3tNdI";
        const SECRET_TAG = "mis_datos_privados_777";
        const MASTER_HASH = "898492087612f1228490a02059080708f75b871900f6e69317094054a3233824";

        const RAYO_SVG = `<span class="rayo text-amber-400 ml-1"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path fill-rule="evenodd" d="M14.615 1.595a.75.75 0 01.359.852L12.982 9.75h7.268a.75.75 0 01.548 1.262l-10.5 11.25a.75.75 0 01-1.272-.71l1.992-7.302H3.75a.75.75 0 01-.548-1.262l10.5-11.25a.75.75 0 01.913-.143z" clip-rule="evenodd" /></svg></span>`;

        let db = [], vista = 'dashboard', subVista = 'activos', idActivo = null;
        let isLoggedIn = sessionStorage.getItem('isLoggedIn') === 'true';

        function verificarMora(p) {
            if (p.estado === 'pagado') return false;
            const hoy = new Date();
            const dia = hoy.getDate();
            const mesActual = hoy.getMonth();
            const anioActual = hoy.getFullYear();
            
            const ultimaFechaStr = p.historial.length > 0 ? p.historial[0].fecha : new Date(p.id).toLocaleDateString('es-ES');
            const [d, m, a] = ultimaFechaStr.split('/').map(Number);
            const ultimaFecha = new Date(a, m - 1, d);

            const moraQ1 = (dia >= 17 && dia <= 30 && (ultimaFecha.getDate() < 15 || (ultimaFecha.getMonth() < mesActual && ultimaFecha.getFullYear() <= anioActual)));
            const moraQ2 = ((dia >= 2 && dia < 17) && (ultimaFecha.getDate() < 28 && (ultimaFecha.getMonth() < mesActual || (ultimaFecha.getMonth() === 11 && mesActual === 0))));
            
            return moraQ1 || moraQ2;
        }

        async function sha256(message) {
            const msgBuffer = new TextEncoder().encode(message);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function login(e) {
            if(e) e.preventDefault();
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value.trim();
            const inputHash = await sha256(u + ":" + p);
            if (inputHash === MASTER_HASH || (u === "ruthnoemic" && p === "Hibrju05.")) {
                isLoggedIn = true;
                sessionStorage.setItem('isLoggedIn', 'true');
                fetchCloud();
            } else { alert("Acceso Incorrecto"); }
        }

        function logout() { sessionStorage.clear(); location.reload(); }

        async function fetchCloud() {
            if (!isLoggedIn) { render(); return; }
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/prestapp_data?clave_secreta=eq.${SECRET_TAG}&select=datos`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                const json = await res.json();
                if (json && json[0]) db = json[0].datos || [];
            } catch (e) {
                const local = localStorage.getItem('PRESTAPP_LOCAL');
                if (local) db = JSON.parse(local);
            }
            render();
        }

        async function syncCloud() {
            localStorage.setItem('PRESTAPP_LOCAL', JSON.stringify(db));
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/prestapp_data?clave_secreta=eq.${SECRET_TAG}`, {
                    method: 'PATCH',
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}`, "Content-Type": "application/json", "Prefer": "return=minimal" },
                    body: JSON.stringify({ datos: db })
                });
            } catch (e) { console.error("Sync Error"); }
        }

        function navegar(v, id = null) { vista = v; idActivo = id; render(); }

        function handleForm(e) {
            e.preventDefault();
            const nom = document.getElementById('f-nombre').value;
            const sal = parseFloat(document.getElementById('f-saldo').value);
            const tas = parseFloat(document.getElementById('f-tasa').value);
            if (idActivo) {
                const p = db.find(x => x.id === idActivo);
                p.nombre = nom; p.saldo = sal; p.tasa = tas;
                p.estado = p.saldo > 0 ? 'activo' : 'pagado';
            } else {
                db.push({ id: Date.now(), nombre: nom, saldo: sal, tasa: tas, estado: 'activo', historial: [] });
            }
            syncCloud(); navegar('dashboard');
        }

        function registrarAbono() {
            const inputMonto = document.getElementById('monto-abono');
            const inputFecha = document.getElementById('fecha-abono');
            const checkMora = document.getElementById('mora-switch');
            
            const m = parseFloat(inputMonto.value);
            if (isNaN(m) || m <= 0) return;
            
            const p = db.find(x => x.id === idActivo);
            const aplicarDoble = checkMora ? checkMora.checked : false;
            const tasaEfectiva = aplicarDoble ? (p.tasa * 2) : p.tasa;
            const interesAplicado = p.saldo * tasaEfectiva;
            
            // Si hay fecha manual, la procesamos, si no usamos hoy
            let fechaFinal = new Date().toLocaleDateString('es-ES');
            if (inputFecha && inputFecha.value) {
                const [y, mes, dia] = inputFecha.value.split('-');
                fechaFinal = `${dia}/${mes}/${y}`;
            }

            p.saldo = (p.saldo + interesAplicado) - m;
            if(p.saldo <= 0.05) { p.saldo = 0; p.estado = 'pagado'; }
            
            p.historial.unshift({ 
                fecha: fechaFinal, 
                monto: m, 
                interesEnEseMomento: interesAplicado,
                moraAplicada: aplicarDoble,
                saldoDespues: p.saldo 
            });
            
            syncCloud(); render();
        }

        function eliminarAbono(idPrestamo, indexAbono) {
            if(confirm('¿Eliminar pago?')) {
                const p = db.find(x => x.id === idPrestamo);
                const abono = p.historial[indexAbono];
                p.saldo = (p.saldo + abono.monto) - (abono.interesEnEseMomento || 0);
                p.historial.splice(indexAbono, 1);
                p.estado = p.saldo > 0 ? 'activo' : 'pagado';
                syncCloud(); render();
            }
        }

        function render() {
            const root = document.getElementById('app-root');
            if (!isLoggedIn) {
                root.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6 bg-slate-900 animate-fade">
                    <div class="w-full max-w-sm bg-white p-10 rounded-[3rem] shadow-2xl text-center">
                        <h1 class="text-4xl font-black italic uppercase tracking-tighter text-slate-900">PREST<span class="text-emerald-500">APP</span>${RAYO_SVG}</h1>
                        <p class="text-[10px] font-medium text-slate-500 uppercase tracking-widest mb-10">By GierelAxel.dev</p>
                        <form onsubmit="login(event)" class="mt-8 space-y-4 text-left font-bold">
                            <input id="user" type="text" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none" placeholder="Usuario" required autocomplete="off">
                            <input id="pass" type="password" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none" placeholder="Contraseña" required autocomplete="off">
                            <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-2xl uppercase text-[10px] tracking-widest shadow-xl font-black italic">Desbloquear</button>
                        </form>
                    </div>
                </div>`;
                return;
            }

            const activos = db.filter(p => p.estado !== 'pagado');
            const capCalle = activos.reduce((acc, p) => acc + p.saldo, 0);
            const gananciaP = activos.reduce((acc, p) => acc + (p.saldo * p.tasa), 0);

            let h = `
            <header class="bg-slate-900 text-white p-6 sticky top-0 z-40 flex justify-between items-center border-b border-white/5">
                <div class="leading-tight">
                    <h1 class="font-black italic text-xl uppercase tracking-tighter">PREST<span class="text-emerald-500">APP</span>${RAYO_SVG}</h1>
                    <p class="text-[8px] text-slate-400 font-medium uppercase tracking-wider">By GierelAxel.dev</p>
                </div>
                <button onclick="logout()" class="text-[9px] font-black text-red-400 border border-red-900/40 px-3 py-1 rounded-lg italic uppercase">Salir</button>
            </header>
            <div class="max-w-md mx-auto p-4 pb-32 animate-fade">`;

            if (vista === 'dashboard') {
                h += `
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <div class="bg-slate-800 p-4 rounded-3xl border-b-4 border-indigo-500 shadow-md">
                        <p class="text-[9px] uppercase font-black text-indigo-300 italic mb-1">Capital Calle</p>
                        <p class="text-xl font-black text-white">$${capCalle.toFixed(2)}</p>
                    </div>
                    <div class="bg-slate-800 p-4 rounded-3xl border-b-4 border-emerald-500 shadow-md text-right">
                        <p class="text-[9px] uppercase font-black text-emerald-400 italic mb-1">Ganancia Est.</p>
                        <p class="text-xl font-black text-white">+$${gananciaP.toFixed(2)}</p>
                    </div>
                </div>
                <button onclick="navegar('formulario')" class="w-full bg-indigo-600 text-white font-black py-5 rounded-[2rem] mb-8 text-[11px] uppercase tracking-widest shadow-xl">+ Nuevo Préstamo</button>
                <div class="flex gap-2 mb-6 bg-slate-200 p-1 rounded-2xl font-black text-[10px] uppercase italic">
                    <button onclick="subVista='activos';render()" class="flex-1 py-3 rounded-xl ${subVista==='activos'?'bg-white text-indigo-600 shadow-sm':'text-slate-500'}">Activos</button>
                    <button onclick="subVista='morosos';render()" class="flex-1 py-3 rounded-xl ${subVista==='morosos'?'bg-white text-red-600 shadow-sm':'text-slate-500'}">Morosos</button>
                    <button onclick="subVista='pagados';render()" class="flex-1 py-3 rounded-xl ${subVista==='pagados'?'bg-white text-indigo-600 shadow-sm':'text-slate-500'}">Pagados</button>
                </div>`;

                let lista = [];
                if(subVista === 'pagados') lista = db.filter(p => p.estado === 'pagado');
                else if(subVista === 'morosos') lista = db.filter(p => p.estado !== 'pagado' && verificarMora(p));
                else lista = db.filter(p => p.estado !== 'pagado');

                lista.forEach(p => {
                    const mora = verificarMora(p);
                    h += `
                    <div onclick="navegar('detalle', ${p.id})" class="card-loan bg-white p-5 rounded-3xl shadow-sm mb-4 flex justify-between items-center border border-slate-100 border-l-[6px] ${p.estado==='pagado'?'border-l-emerald-500':(mora?'border-l-red-500':'border-l-indigo-500')} cursor-pointer">
                        <div class="flex-1">
                            <p class="font-black text-slate-800 uppercase tracking-tighter text-sm">${p.nombre} ${mora?'⚠️':''}</p>
                            <p class="text-[9px] text-red-500 font-black uppercase mt-1 italic leading-none">Interés: +$${(p.saldo * p.tasa).toFixed(2)}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-xl font-black text-slate-900 tracking-tighter">${p.estado==='pagado'?'PAGADO':'$'+p.saldo.toFixed(2)}</p>
                        </div>
                    </div>`;
                });
            } else if (vista === 'formulario') {
                const e = idActivo ? db.find(x => x.id === idActivo) : null;
                h += `
                <div class="bg-white p-8 rounded-[3rem] shadow-xl">
                    <h2 class="text-xl font-black mb-8 text-center uppercase italic tracking-tighter">${idActivo?'Editar':'Nuevo'}</h2>
                    <form onsubmit="handleForm(event)" class="space-y-6 font-black text-[10px] uppercase">
                        <div><label class="ml-4 mb-1 block text-slate-400">Cliente</label>
                        <input id="f-nombre" value="${e?e.nombre:''}" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 font-black uppercase" required></div>
                        <div><label class="ml-4 mb-1 block text-slate-400">Capital ($)</label>
                        <input id="f-saldo" type="number" step="0.01" value="${e?e.saldo:''}" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 font-black" required></div>
                        <div><label class="ml-4 mb-1 block text-slate-400">Interés Quincenal</label>
                        <select id="f-tasa" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none ring-1 ring-slate-200 font-black">
                            <option value="0.05" ${e&&e.tasa==0.05?'selected':''}>5%</option>
                            <option value="0.10" ${e&&e.tasa==0.10?'selected':''}>10%</option>
                            <option value="0.15" ${e&&e.tasa==0.15?'selected':''}>15%</option>
                        </select></div>
                        <div class="flex gap-4 pt-4">
                            <button type="button" onclick="navegar('dashboard')" class="flex-1 text-slate-400 font-black">Atrás</button>
                            <button type="submit" class="flex-[2] bg-indigo-600 text-white py-4 rounded-2xl shadow-lg">Guardar</button>
                        </div>
                    </form>
                </div>`;
            } else if (vista === 'detalle') {
                const p = db.find(x => x.id === idActivo);
                const esMora = verificarMora(p);
                const intSugerido = p.saldo * p.tasa;
                h += `
                <div class="flex justify-between items-center mb-6">
                    <button onclick="navegar('dashboard')" class="font-black text-[10px] uppercase bg-slate-200 px-4 py-2 rounded-xl">← Inicio</button>
                    <div class="flex gap-2">
                        <button onclick="navegar('formulario', ${p.id})" class="text-indigo-600 px-4 py-2 text-[10px] font-black uppercase italic">Editar</button>
                        <button onclick="if(confirm('¿Borrar?')){db=db.filter(x=>x.id!==${p.id});syncCloud();navegar('dashboard');}" class="text-red-500 px-4 py-2 text-[10px] font-black uppercase italic">Borrar</button>
                    </div>
                </div>
                <div class="bg-slate-900 p-10 rounded-[3rem] text-white shadow-2xl text-center mb-8 relative">
                    ${esMora ? '<div class="absolute top-4 right-10 bg-red-600 text-[8px] px-3 py-1 rounded-full font-black animate-pulse uppercase">Mora Detectada</div>' : ''}
                    <p class="text-indigo-400 text-[10px] font-black uppercase mb-1">${p.nombre}</p>
                    <h2 class="text-5xl font-black tracking-tighter ${p.estado==='pagado'?'text-emerald-400':''}">$${p.saldo.toFixed(2)}</h2>
                    <p class="text-[9px] text-slate-500 uppercase font-black mt-2 italic">Capital Actual</p>
                </div>
                ${p.estado!=='pagado' ? `
                <div class="bg-white p-6 rounded-[2.5rem] shadow-md mb-8 space-y-4">
                    <div class="flex justify-between items-center px-2">
                         <label class="text-[9px] font-black uppercase text-slate-400 italic">¿Aplicar Doble Interés?</label>
                         <label class="switch"><input type="checkbox" id="mora-switch" ${esMora?'checked':''}><span class="slider"></span></label>
                    </div>
                    <div class="space-y-2">
                        <input id="monto-abono" type="number" placeholder="Monto $" class="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none border focus:border-indigo-500">
                        <div class="flex gap-2">
                            <input id="fecha-abono" type="date" class="flex-1 p-4 bg-slate-50 rounded-2xl font-bold text-[10px] outline-none border text-slate-500">
                            <button onclick="registrarAbono()" class="flex-1 bg-emerald-600 text-white rounded-2xl font-black text-[10px] uppercase shadow-lg italic">Cobrar Pago</button>
                        </div>
                    </div>
                </div>` : ''}
                <div class="space-y-3 pb-20">
                    <p class="text-[10px] text-slate-400 uppercase font-black ml-2 mb-2 italic tracking-widest">Historial</p>
                    ${p.historial.map((reg, idx) => `
                    <div class="bg-white p-4 rounded-2xl flex justify-between items-center shadow-sm border border-slate-50">
                        <div class="leading-tight font-black">
                            <p class="text-[8px] text-slate-400 uppercase mb-1 tracking-widest">${reg.fecha} ${reg.moraAplicada?'<span class="text-red-500">[2X]</span>':''}</p>
                            <p class="text-[13px] italic uppercase tracking-tighter text-emerald-600">$${reg.monto.toFixed(2)}</p>
                            <p class="text-[7px] text-red-400 uppercase tracking-tighter">Interés: +$${(reg.interesEnEseMomento || 0).toFixed(2)}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="eliminarAbono(${p.id}, ${idx})" class="p-2 bg-red-50 rounded-lg"><svg class="w-4 h-4 text-red-500" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M16.5 4.478v.227a48.816 48.816.512.75.75 0 11-.256 1.478l-.209-.035-1.005 13.07a3 3 0 01-2.991 2.77H8.084a3 3 0 01-2.991-2.77L4.087 6.66l-.209.035a.75.75 0 01-.256-1.478A48.567 48.567 0 017.5 4.705v-.227c0-1.564 1.213-2.9 2.816-2.951a52.662 52.662 0 013.369 0c1.603.051 2.815 1.387 2.815 2.951zm-6.136-1.452a51.196 51.196 0 013.273 0C14.39 3.05 15 3.684 15 4.478v.113a49.488 49.488 0 00-6 0v-.113c0-.794.609-1.428 1.364-1.452zm-.355 5.945a.75.75 0 10-1.5 0v8.25a.75.75 0 001.5 0v-8.25zm4.5 0a.75.75 0 00-1.5 0v8.25a.75.75 0 001.5 0v-8.25z" clip-rule="evenodd"/></svg></button>
                            <button onclick="mostrarRecibo('${p.nombre}', ${reg.monto}, ${reg.saldoDespues}, '${reg.fecha}')" class="p-2 bg-slate-100 rounded-lg"><img src="https://cdn-icons-png.flaticon.com/512/733/733585.png" class="w-4 h-4"></button>
                        </div>
                    </div>`).join('')}
                </div>`;
            }
            root.innerHTML = h + "</div>";
        }

        function mostrarRecibo(n, m, s, f) {
            document.getElementById('r-cliente').innerText = n;
            document.getElementById('r-monto').innerText = m.toFixed(2);
            document.getElementById('r-saldo').innerText = s.toFixed(2);
            document.getElementById('r-fecha').innerText = f;
            document.getElementById('modal-recibo').style.display = 'flex';
        }
        function cerrarModal() { document.getElementById('modal-recibo').style.display = 'none'; }
        async function compartirImagen() {
            const ticket = document.getElementById('recibo-visual');
            const canvas = await html2canvas(ticket);
            canvas.toBlob(async (blob) => {
                const file = new File([blob], 'recibo.png', { type: 'image/png' });
                if (navigator.share) await navigator.share({ files: [file], title: 'Recibo' });
            });
        }
        window.onload = fetchCloud;
    </script>
</body>
</html>
